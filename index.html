oo","author_ko":"안철수","era":"1962-","quote_en":"Compete not with others, but with your yesterday self.","quote_ko":"남과 싸우지 말고, 어제의 자신과 싸워라.","copyright":"attributed","source":"Book","motivation_level":"medium"},{"id":"488","category":"founder","time_slot":"AFTERNOON","author":"Moon Young-mi","author_ko":"문영미","era":"1968-","quote_en":"Differentiation is the art of being missed when you're gone.","quote_ko":"차별화는 사라졌을 때 그리움 받는 기술이다.","copyright":"attributed","source":"Different","motivation_level":"medium"},{"id":"489","category":"founder","time_slot":"MORNING","author":"Richard Branson","author_ko":"리처드 브랜슨","era":"1950-","quote_en":"You don't learn to walk by following rules. You learn by doing, and falling over.","quote_ko":"규칙을 따라 걷는 법을 배우지 않는다. 하고, 넘어지면서 배운다.","copyright":"attributed","source":"Losing My Virginity","motivation_level":"medium"},{"id":"490","category":"founder","time_slot":"AFTERNOON","author":"Arianna Huffington","author_ko":"아리아나 허핑턴","era":"1950-","quote_en":"Failure is not the opposite of success; it's part of success.","quote_ko":"실패는 성공의 반대가 아니라 성공의 일부다.","copyright":"attributed","source":"Thrive","motivation_level":"hard"},{"id":"491","category":"founder","time_slot":"DAWN","author":"Sara Blakely","author_ko":"사라 블레이클리","era":"1971-","quote_en":"Embrace what you don't know.","quote_ko":"모르는 것을 포용하라.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"492","category":"founder","time_slot":"EVENING","author":"Oprah Winfrey","author_ko":"오프라 윈프리","era":"1954-","quote_en":"The greatest discovery of all time is that a person can change his future by merely changing his attitude.","quote_ko":"역사상 가장 위대한 발견은 태도를 바꿈으로써 미래를 바꿀 수 있다는 것이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"493","category":"founder","time_slot":"AFTERNOON","author":"Jack Ma","author_ko":"마윈","era":"1964-","quote_en":"Today is hard. Tomorrow will be worse. But the day after tomorrow will be sunshine.","quote_ko":"오늘은 힘들고 내일은 더 힘들 것이다. 그러나 모레는 햇빛이다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"494","category":"founder","time_slot":"AFTERNOON","author":"Howard Marks","author_ko":"하워드 막스","era":"1946-","quote_en":"You can't predict. You can prepare.","quote_ko":"예측할 수는 없지만, 준비할 수는 있다.","copyright":"attributed","source":"The Most Important Thing","motivation_level":"medium"},{"id":"495","category":"founder","time_slot":"EVENING","author":"Ray Dalio","author_ko":"레이 달리오","era":"1949-","quote_en":"Pain plus reflection equals progress.","quote_ko":"고통 더하기 성찰은 진보와 같다.","copyright":"attributed","source":"Principles","motivation_level":"medium"},{"id":"496","category":"founder","time_slot":"EVENING","author":"Ray Dalio","author_ko":"레이 달리오","era":"1949-","quote_en":"Don't let fear of what others think stop you from being yourself.","quote_ko":"남의 시선에 대한 두려움이 자기 자신이 되는 것을 막지 못하게 하라.","copyright":"attributed","source":"Principles","motivation_level":"medium"},{"id":"497","category":"founder","time_slot":"MORNING","author":"Howard Schultz","author_ko":"하워드 슐츠","era":"1953-","quote_en":"Success is not an entitlement, it has to be earned every day.","quote_ko":"성공은 권리가 아니다. 매일 얻어내야 한다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"498","category":"founder","time_slot":"EVENING","author":"Kiran Mazumdar-Shaw","author_ko":"키란 마줌다르-쇼","era":"1953-","quote_en":"Fear and failure are two sides of the same coin.","quote_ko":"두려움과 실패는 같은 동전의 양면이다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"499","category":"founder","time_slot":"DAWN","author":"Hiroshi Mikitani","author_ko":"미키타니 히로시","era":"1965-","quote_en":"Unless you believe, you cannot do.","quote_ko":"믿지 않으면 할 수 없다.","copyright":"attributed","source":"Interview","motivation_level":"calm"},{"id":"500","category":"founder","time_slot":"AFTERNOON","author":"Tadashi Yanai","author_ko":"야나이 타다시","era":"1949-","quote_en":"The moment ":"Reading is the cheapest strategy for changing your life.","quote_ko":"독서는 인생을 바꾸는 가장 저렴한 전략이다.","copyright":"attributed","source":"이 책은 돈 버는 법에 관한 이야기","motivation_level":"medium"},{"id":"508","category":"growth","time_slot":"AFTERNOON","author":"Park Kyung-chul","author_ko":"박경철","era":"1964-","quote_en":"Money is the shadow of value; chase the value, not the shadow.","quote_ko":"돈은 가치의 그림자다. 그림자가 아닌 가치를 좇아라.","copyright":"attributed","source":"Lectures","motivation_level":"medium"},{"id":"509","category":"growth","time_slot":"MORNING","author":"Ja Seong-hye","author_ko":"자성혜","era":"1970-","quote_en":"Self-management is the architecture of freedom.","quote_ko":"자기관리는 자유의 건축이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"510","category":"growth","time_slot":"EVENING","author":"Han Ji-min","author_ko":"한지민(철학교수)","era":"1975-","quote_en":"Doubt is the beginning of wisdom.","quote_ko":"의심은 지혜의 시작이다.","copyright":"attributed","source":"Lectures","motivation_level":"medium"},{"id":"511","category":"growth","time_slot":"AFTERNOON","author":"Shin Su-jeong","author_ko":"신수정","era":"1967-","quote_en":"Leadership is not about having answers; it's about asking better questions.","quote_ko":"리더십은 답을 가지는 것이 아니라 더 나은 질문을 던지는 것이다.","copyright":"attributed","source":"일의 격","motivation_level":"medium"},{"id":"512","category":"growth","time_slot":"EVENING","author":"Kim Young-ha","author_ko":"김영하","era":"1968-","quote_en":"Reading is pre-experience of a life you have not yet lived.","quote_ko":"독서는 아직 살아보지 않은 삶의 예비 체험이다.","copyright":"attributed","source":"말하다","motivation_level":"medium"},{"id":"513","category":"growth","time_slot":"MORNING","author":"Lee Ki-joo","author_ko":"이기주","era":"1980-","quote_en":"The quality of a life is the quality of its habits.","quote_ko":"삶의 질은 습관의 질이다.","copyright":"attributed","source":"말의 품격","motivation_level":"medium"},{"id":"514","category":"growth","time_slot":"NIGHT","author":"Lee Oi-soo","author_ko":"이외수","era":"1946-2022","quote_en":"To live is to endure. To endure is to become.","quote_ko":"산다는 것은 견디는 것이다. 견디는 것은 되어가는 것이다.","copyright":"attributed","source":"하악하악","motivation_level":"calm"},{"id":"515","category":"growth","time_slot":"EVENING","author":"Kim Ran-do","author_ko":"김난도","era":"1963-","quote_en":"Pain is proof that you're still trying.","quote_ko":"아픔은 네가 아직 시도하고 있다는 증거다.","copyright":"attributed","source":"아프니까 청춘이다","motivation_level":"calm"},{"id":"516","category":"growth","time_slot":"MORNING","author":"Han Bi-ya","author_ko":"한비야","era":"1958-","quote_en":"The best investment is investing in yourself.","quote_ko":"최고의 투자는 자신에 대한 투자다.","copyright":"attributed","source":"Lectures","motivation_level":"medium"},{"id":"517","category":"growth","time_slot":"EVENING","author":"Kim Hyung-seok","author_ko":"김형석","era":"1920-","quote_en":"A meaningful life is one spent caring for others.","quote_ko":"의미 있는 삶이란 타인을 돌보는 데 쓰인 삶이다.","copyright":"attributed","source":"백년을 살아보니","motivation_level":"medium"},{"id":"518","category":"growth","time_slot":"NIGHT","author":"Baek Se-hee","author_ko":"백세희","era":"1990-","quote_en":"It's okay to not be okay, as long as you keep walking.","quote_ko":"괜찮지 않아도 괜찮다, 계속 걷기만 한다면.","copyright":"attributed","source":"죽고 싶지만 떡볶이는 먹고 싶어","motivation_level":"calm"},{"id":"519","category":"growth","time_slot":"DAWN","author":"Seol Min-seok","author_ko":"설민석","era":"1970-","quote_en":"Every beginning is small. Every accumulation is vast.","quote_ko":"모든 시작은 작다. 모든 축적은 거대하다.","copyright":"attributed","source":"Lectures","motivation_level":"medium"},{"id":"520","category":"growth","time_slot":"MORNING","author":"Park Woong-hyun","author_ko":"박웅현","era":"1962-","quote_en":"Read well. See well. Listen well. Then speak.","quote_ko":"잘 읽어라. 잘 보아라. 잘 들어라. 그 다음에 말하라.","copyright":"attributed","source":"책은 도끼다","motivation_level":"medium"},{"id":"521","category":"growth","time_slot":"EVENING","author":"Saito Takashi","author_ko":"사이토 다카시","era":"1960-","quote_en":"Depth of thought comes from depth of reading.","quote_ko":"사고의 깊이는 독서의 깊이에서 나온다.","copyright":"attributed","source":"독서력","motivation_level":"medium"},{"id":"522","category":"growth","time_slot":"DAWN","author":"Kim Eun-ju","author_ko":"김은주","era":"1975-","quote_en":"Curiosity is the first virtue of a learner.","quote_ko":"호기심은 학습자의 첫 번째 덕목이다.","copyright":"attributed","source":"Lectures","motivation_level":"medium"},{"id":"523","category":"growth","time_slot":"AFTERNOON","author":"Yuval Noah Harari","author_ko":"유발 하라리","era":"1976-","quote_en":"In a world deluged by irrelevant information, clarity is power.","quote_ko":"무관한 정보가 범람하는 세상에서, 명료함이 힘이다.","copyright":"attributed","source":"21 Lessons","motivation_level":"medium"},{"id":"524","category":"growth","time_slot":"NIGHT","author":"Ha Tae-wan","author_ko":"하태완","era":"1988-","quote_en":"You don't need to be loud to be strong.","quote_ko":"강해지기 위해 시끄러워질 필요는 없다.","copyright":"attributed","source":"모든 순간이 너였다","motivation_level":"calm"},{"id":"525","category":"growth","time_slot":"NIGHT","author":"Jeong Mok","author_ko":"정목 스님","era":"1958-","quote_en":"Where your attention goes, your life goes.","quote_ko":"마음이 가는 곳으로 삶이 간다.","copyright":"attributed","source":"나를 사랑하기로 했습니다","motivation_level":"calm"},{"id":"526","category":"growth","time_slot":"EVENING","author":"Mark Manson","author_ko":"마크 맨슨","era":"1984-","quote_en":"The desire for more positive experience is itself a negative experience.","quote_ko":"더 긍정적 경험을 향한 갈망 자체가 부정적 경험이다.","copyright":"attributed","source":"The Subtle Art of Not Giving a F*ck","motivation_level":"medium"},{"id":"527","category":"growth","time_slot":"MORNING","author":"Mark Manson","author_ko":"마크 맨슨","era":"1984-","quote_en":"You are already choosing, in every moment of every day, what to give a f*ck about.","quote_ko":"매일 매 순간, 당신은 이미 무엇에 신경 쓸지 선택하고 있다.","copyright":"attributed","source":"The Subtle Art","motivation_level":"medium"},{"id":"528","category":"growth","time_slot":"MORNING","author":"Atul Gawande","author_ko":"아툴 가완디","era":"1965-","quote_en":"Better is possible. It does not take genius. It takes diligence.","quote_ko":"더 나아질 수 있다. 천재성이 아니라 성실함이 필요하다.","copyright":"attributed","source":"Better","motivation_level":"medium"},{"id":"529","category":"growth","time_slot":"NIGHT","author":"Daniel Kahneman","author_ko":"대니얼 카너먼","era":"1934-2024","quote_en":"Our comforting conviction that the world makes sense rests on a secure foundation: our almost unlimited ability to ignore our ignorance.","quote_ko":"세상이 이치에 맞는다는 편안한 확신은 무지를 무시하는 우리의 거의 무한한 능력 위에 세워져 있다.","copyright":"attributed","source":"Thinking, Fast and Slow","motivation_level":"calm"},{"id":"530","category":"growth","time_slot":"MORNING","author":"Amy Cuddy","author_ko":"에이미 커디","era":"1972-","quote_en":"Don't fake it till you make it. Fake it till you become it.","quote_ko":"될 때까지 속이지 마라. 그것이 될 때까지 속여라.","copyright":"attributed","source":"TED Talk","motivation_level":"medium"},{"id":"531","category":"growth","time_slot":"EVENING","author":"Susan Cain","author_ko":"수잔 케인","era":"1968-","quote_en":"There's zero correlation between being the best talker and having the best ideas.","quote_ko":"가장 말 잘하는 것과 가장 좋은 아이디어를 갖는 것 사이엔 상관관계가 없다.","copyright":"attributed","source":"Quiet","motivation_level":"medium"},{"id":"532","category":"growth","time_slot":"MORNING","author":"Brian Tracy","author_ko":"브라이언 트레이시","era":"1944-","quote_en":"Eat that frog! Do the hardest thing first.","quote_ko":"개구리를 먹어라! 가장 어려운 일을 먼저 하라.","copyright":"attributed","source":"Eat That Frog","motivation_level":"hard"},{"id":"533","category":"growth","time_slot":"EVENING","author":"Stephen King","author_ko":"스티븐 킹","era":"1947-","quote_en":"You cannot hope to sweep someone else away by the force of your writing until it has been done to you.","quote_ko":"당신에게 먼저 일어나지 않은 일을, 글의 힘으로 남에게 일어나게 할 수 없다.","copyright":"attributed","source":"On Writing","motivation_level":"medium"},{"id":"534","category":"growth","time_slot":"NIGHT","author":"Anne Lamott","author_ko":"앤 라모트","era":"1954-","quote_en":"Almost everything will work again if you unplug it for a few minutes, including you.","quote_ko":"거의 모든 것은 몇 분간 플러그를 뽑으면 다시 작동한다. 당신도 포함해서.","copyright":"attributed","source":"Bird by Bird","motivation_level":"calm"},{"id":"535","category":"growth","time_slot":"DAWN","author":"Elizabeth Gilbert","author_ko":"엘리자베스 길버트","era":"1969-","quote_en":"You can either rid yourself of the fear, or you can act despite it.","quote_ko":"두려움을 없애거나, 두려움에도 불구하고 행동하거나 둘 중 하나다.","copyright":"attributed","source":"Big Magic","motivation_level":"medium"},{"id":"536","category":"growth","time_slot":"NOON","author":"Austin Kleon","author_ko":"오스틴 클레온","era":"1983-","quote_en":"Start copying what you love. Copy, copy, copy, copy. At the end of the copy you will find yourself.","quote_ko":"사랑하는 것을 베끼기 시작하라. 베끼고 베끼고 또 베껴라. 베낌의 끝에서 자신을 발견할 것이다.","copyright":"attributed","source":"Steal Like an Artist","motivation_level":"medium"},{"id":"537","category":"growth","time_slot":"DAWN","author":"Scott Galloway","author_ko":"스콧 갤러웨이","era":"1964-","quote_en":"Nothing wonderful happens in your comfort zone.","quote_ko":"편안한 지대에서는 멋진 일이 일어나지 않는다.","copyright":"attributed","source":"The Algebra of Happiness","motivation_level":"calm"},{"id":"538","category":"growth","time_slot":"EVENING","author":"Shonda Rhimes","author_ko":"숀다 라임스","era":"1970-","quote_en":"Happiness comes from doing work you love.","quote_ko":"행복은 사랑하는 일을 함으로써 온다.","copyright":"attributed","source":"Year of Yes","motivation_level":"medium"},{"id":"539","category":"growth","time_slot":"MORNING","author":"Marie Forleo","author_ko":"마리 폴레오","era":"1975-","quote_en":"Everything is figureoutable.","quote_ko":"모든 것은 해결 가능하다.","copyright":"attributed","source":"Everything Is Figureoutable","motivation_level":"medium"},{"id":"540","category":"growth","time_slot":"NOON","author":"Julia Cameron","author_ko":"줄리아 캐머런","era":"1948-","quote_en":"The quality of life is in proportion to the capacity for delight.","quote_ko":"삶의 질은 기쁨을 느끼는 능력에 비례한다.","copyright":"attributed","source":"The Artist's Way","motivation_level":"medium"},{"id":"541","category":"growth","time_slot":"MORNING","author":"BJ Fogg","author_ko":"BJ 포그","era":"1963-","quote_en":"Celebration creates transformation.","quote_ko":"축하가 변화를 만든다.","copyright":"attributed","source":"Tiny Habits","motivation_level":"medium"},{"id":"542","category":"growth","time_slot":"AFTERNOON","author":"Nir Eyal","author_ko":"니르 이얄","era":"1980-","quote_en":"You can't call something a distraction unless you know what it distracts you from.","quote_ko":"무엇으로부터 주의를 돌리게 하는지 모르면 그것을 방해라 부를 수 없다.","copyright":"attributed","source":"Indistractable","motivation_level":"calm"},{"id":"543","category":"growth","time_slot":"MORNING","author":"Cal Newport","author_ko":"칼 뉴포트","era":"1982-","quote_en":"Efforts to deepen your focus will struggle if you don't simultaneously wean your mind from a dependence on distraction.","quote_ko":"산만함 의존에서 벗어나지 않으면 집중 심화 노력은 어려워진다.","copyright":"attributed","source":"Deep Work","motivation_level":"medium"},{"id":"544","category":"growth","time_slot":"NOON","author":"Greg McKeown","author_ko":"그렉 맥케온","era":"1977-","quote_en":"Less but better. Prioritize and simplify.","quote_ko":"적게, 그러나 더 좋게. 우선순위를 정하고 단순화하라.","copyright":"attributed","source":"Essentialism","motivation_level":"calm"},{"id":"545","category":"growth","time_slot":"MORNING","author":"Tim Urban","author_ko":"팀 어반","era":"1982-","quote_en":"The Instant Gratification Monkey is the easiest creature in the world to defeat. All you have to do is decide.","quote_ko":"즉각적 만족 원숭이는 세상에서 가장 이기기 쉬운 적이다. 그저 결정하면 된다.","copyright":"attributed","source":"Wait But Why","motivation_level":"medium"},{"id":"546","category":"growth","time_slot":"AFTERNOON","author":"Chip Heath","author_ko":"칩 히스","era":"1963-","quote_en":"If you want people to change, provide crystal-clear direction.","quote_ko":"사람들이 변하길 원한다면 수정처럼 명확한 방향을 제시하라.","copyright":"attributed","source":"Switch","motivation_level":"medium"},{"id":"547","category":"growth","time_slot":"EVENING","author":"Gretchen Rubin","author_ko":"그레첸 루빈","era":"1965-","quote_en":"The days are long, but the years are short.","quote_ko":"하루는 길지만 한 해는 짧다.","copyright":"attributed","source":"The Happiness Project","motivation_level":"medium"},{"id":"548","category":"growth","time_slot":"NOON","author":"Michael Pollan","author_ko":"마이클 폴런","era":"1955-","quote_en":"Eat food. Not too much. Mostly plants.","quote_ko":"음식을 먹어라. 과하지 말고. 주로 식물을.","copyright":"attributed","source":"In Defense of Food","motivation_level":"medium"},{"id":"549","category":"growth","time_slot":"NIGHT","author":"Pema Chödrön","author_ko":"페마 초드론","era":"1936-","quote_en":"You are the sky. Everything else is just the weather.","quote_ko":"너는 하늘이다. 나머지는 모두 날씨일 뿐이다.","copyright":"attributed","source":"When Things Fall Apart","motivation_level":"calm"},{"id":"550","category":"growth","time_slot":"EVENING","author":"Rick Rubin","author_ko":"릭 루빈","era":"1963-","quote_en":"The best art divides the audience.","quote_ko":"최고의 예술은 관객을 나눈다.","copyright":"attributed","source":"The Creative Act","motivation_level":"medium"},{"id":"551","category":"growth","time_slot":"DAWN","author":"David Goggins","author_ko":"데이비드 고긴스","era":"1975-","quote_en":"Stay hard. You can't hurt me.","quote_ko":"버텨라. 날 해칠 수 없다.","copyright":"attributed","source":"Can't Hurt Me","motivation_level":"hard"},{"id":"552","category":"growth","time_slot":"MORNING","author":"David Goggins","author_ko":"데이비드 고긴스","era":"1975-","quote_en":"Most people give up at 40% of their capacity.","quote_ko":"대부분은 역량의 40%에서 포기한다.","copyright":"attributed","source":"Can't Hurt Me","motivation_level":"hard"},{"id":"553","category":"growth","time_slot":"EVENING","author":"David Goggins","author_ko":"데이비드 고긴스","era":"1975-","quote_en":"The most important conversations you'll ever have are the ones you'll have with yourself.","quote_ko":"당신이 나눌 가장 중요한 대화는 자기 자신과의 대화다.","copyright":"attributed","source":"Can't Hurt Me","motivation_level":"hard"},{"id":"554","category":"growth","time_slot":"AFTERNOON","author":"David Goggins","author_ko":"데이비드 고긴스","era":"1975-","quote_en":"Don't stop when you're tired. Stop when you're done.","quote_ko":"지쳤을 때 멈추지 마라. 끝냈을 때 멈춰라.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"555","category":"growth","time_slot":"DAWN","author":"Jocko Willink","author_ko":"조코 윌링크","era":"1971-","quote_en":"Get after it.","quote_ko":"덤벼라.","copyright":"attributed","source":"Extreme Ownership","motivation_level":"hard"},{"id":"556","category":"growth","time_slot":"AFTERNOON","author":"Jocko Willink","author_ko":"조코 윌링크","era":"1971-","quote_en":"There is no finish line. There is no podium.","quote_ko":"결승선은 없다. 시상대도 없다.","copyright":"attributed","source":"Discipline Equals Freedom","motivation_level":"hard"},{"id":"557","category":"growth","time_slot":"MORNING","author":"Jocko Willink","author_ko":"조코 윌링크","era":"1971-","quote_en":"Good. When things are bad, say 'Good'—and then figure out how to make them better.","quote_ko":"좋다. 상황이 나쁠 때 '좋다'고 말하고, 그 다음 어떻게 나아질지 찾아라.","copyright":"attributed","source":"Discipline Equals Freedom","motivation_level":"hard"},{"id":"558","category":"growth","time_slot":"MORNING","author":"Andrew Huberman","author_ko":"앤드류 휴버먼","era":"1975-","quote_en":"Effort is the highest leverage input.","quote_ko":"노력이 가장 높은 레버리지 투입이다.","copyright":"attributed","source":"Huberman Lab","motivation_level":"hard"},{"id":"559","category":"growth","time_slot":"MORNING","author":"Andrew Huberman","author_ko":"앤드류 휴버먼","era":"1975-","quote_en":"Your nervous system is your superpower. Train it.","quote_ko":"신경계가 당신의 초능력이다. 훈련하라.","copyright":"attributed","source":"Huberman Lab","motivation_level":"hard"},{"id":"560","category":"growth","time_slot":"AFTERNOON","author":"Cameron Hanes","author_ko":"카메론 하네스","era":"1967-","quote_en":"Keep hammering.","quote_ko":"계속 두드려라.","copyright":"attributed","source":"Endure","motivation_level":"hard"},{"id":"561","category":"growth","time_slot":"MORNING","author":"Cameron Hanes","author_ko":"카메론 하네스","era":"1967-","quote_en":"Nobody cares, work harder.","quote_ko":"아무도 신경 쓰지 않는다. 더 열심히 해라.","copyright":"attributed","source":"Endure","motivation_level":"hard"},{"id":"562","category":"growth","time_slot":"MORNING","author":"Marcus Aurelius","author_ko":"마르쿠스 아우렐리우스","era":"121-180","quote_en":"Waste no more time arguing what a good man should be. Be one.","quote_ko":"좋은 사람이 어떤지 논쟁할 시간 낭비하지 마라. 좋은 사람이 되어라.","copyright":"public_domain","source":"Meditations","motivation_level":"hard"},{"id":"563","category":"growth","time_slot":"DAWN","author":"Epictetus","author_ko":"에픽테토스","era":"50-135","quote_en":"No man is free who is not master of himself.","quote_ko":"자기 자신의 주인이 아닌 자는 누구도 자유롭지 않다.","copyright":"public_domain","source":"Discourses","motivation_level":"hard"},{"id":"564","category":"growth","time_slot":"MORNING","author":"Seneca","author_ko":"세네카","era":"4 BC-65 AD","quote_en":"Luck is what happens when preparation meets opportunity.","quote_ko":"운이란 준비와 기회가 만나는 것이다.","copyright":"public_domain","source":"Letters","motivation_level":"hard"},{"id":"565","category":"growth","time_slot":"AFTERNOON","author":"Theodore Roosevelt","author_ko":"시어도어 루스벨트","era":"1858-1919","quote_en":"It is not the critic who counts; it is the man who is actually in the arena.","quote_ko":"중요한 것은 비평하는 자가 아니라 실제로 경기장에 있는 자다.","copyright":"public_domain","source":"Speech 1910","motivation_level":"hard"},{"id":"566","category":"growth","time_slot":"MORNING","author":"Theodore Roosevelt","author_ko":"시어도어 루스벨트","era":"1858-1919","quote_en":"Nothing in the world is worth having or worth doing unless it means effort, pain, difficulty.","quote_ko":"세상에서 노력과 고통, 어려움을 의미하지 않는 것은 가질 가치도, 할 가치도 없다.","copyright":"public_domain","source":"Speech","motivation_level":"hard"},{"id":"567","category":"growth","time_slot":"AFTERNOON","author":"Winston Churchill","author_ko":"처칠","era":"1874-1965","quote_en":"When you're going through hell, keep going.","quote_ko":"지옥을 통과하고 있다면, 계속 가라.","copyright":"fair_use","source":"Speech","motivation_level":"hard"},{"id":"568","category":"growth","time_slot":"DAWN","author":"George S. Patton","author_ko":"조지 패튼","era":"1885-1945","quote_en":"Accept the challenges so that you can feel the exhilaration of victory.","quote_ko":"도전을 받아들여야 승리의 황홀함을 느낄 수 있다.","copyright":"public_domain","source":"Speeches","motivation_level":"hard"},{"id":"569","category":"growth","time_slot":"DAWN","author":"Admiral William McRaven","author_ko":"윌리엄 맥레이븐","era":"1955-","quote_en":"If you want to change the world, start off by making your bed.","quote_ko":"세상을 바꾸고 싶다면 침대를 정리하는 것부터 시작하라.","copyright":"attributed","source":"Make Your Bed","motivation_level":"hard"},{"id":"570","category":"growth","time_slot":"AFTERNOON","author":"Goggins (variant)","author_ko":"데이비드 고긴스","era":"1975-","quote_en":"Callus your mind through suffering.","quote_ko":"고통을 통해 마음에 굳은살을 박아라.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"571","category":"growth","time_slot":"EVENING","author":"Chris Williamson","author_ko":"크리스 윌리엄슨","era":"1987-","quote_en":"Direction is more important than speed.","quote_ko":"속도보다 방향이 중요하다.","copyright":"attributed","source":"Modern Wisdom","motivation_level":"hard"},{"id":"572","category":"growth","time_slot":"MORNING","author":"Andy Frisella","author_ko":"앤디 프리셀라","era":"1984-","quote_en":"Do what you said you would do, for as long as you said you were going to do it.","quote_ko":"하기로 한 것을, 하기로 한 기간 동안 해내라.","copyright":"attributed","source":"75 Hard","motivation_level":"hard"},{"id":"573","category":"growth","time_slot":"AFTERNOON","author":"Tim Grover","author_ko":"팀 그로버","era":"1965-","quote_en":"Winning isn't everything; it's the only thing.","quote_ko":"이기는 것이 전부가 아니다. 유일한 것이다.","copyright":"attributed","source":"Relentless","motivation_level":"hard"},{"id":"574","category":"growth","time_slot":"AFTERNOON","author":"Tim Grover","author_ko":"팀 그로버","era":"1965-","quote_en":"When you're done, you'll know it. Until then, you're not done.","quote_ko":"끝났을 때 알 것이다. 그때까지는 끝난 게 아니다.","copyright":"attributed","source":"Relentless","motivation_level":"hard"},{"id":"575","category":"growth","time_slot":"EVENING","author":"Bruce Lee","author_ko":"브루스 리","era":"1940-1973","quote_en":"Don't pray for an easy life; pray for the strength to endure a difficult one.","quote_ko":"쉬운 삶을 기도하지 마라. 어려운 삶을 견뎌낼 힘을 기도하라.","copyright":"attributed","source":"Tao of Jeet Kune Do","motivation_level":"hard"},{"id":"576","category":"growth","time_slot":"AFTERNOON","author":"Michael Jordan","author_ko":"마이클 조던","era":"1963-","quote_en":"I've failed over and over and over again in my life. And that is why I succeed.","quote_ko":"나는 인생에서 반복해서 실패해왔다. 그래서 성공한다.","copyright":"attributed","source":"Nike commercial 1997","motivation_level":"hard"},{"id":"577","category":"growth","time_slot":"MORNING","author":"Michael Jordan","author_ko":"마이클 조던","era":"1963-","quote_en":"I can accept failure, everyone fails at something. But I can't accept not trying.","quote_ko":"실패는 받아들일 수 있다. 누구나 실패한다. 그러나 시도하지 않는 것은 받아들일 수 없다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"578","category":"growth","time_slot":"DAWN","author":"Michael Jordan","author_ko":"마이클 조던","era":"1963-","quote_en":"Some people want it to happen, some wish it would happen, others make it happen.","quote_ko":"어떤 이는 일어나기를 원하고, 어떤 이는 일어나기를 바라고, 어떤 이는 일어나게 만든다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"579","category":"growth","time_slot":"MORNING","author":"Kobe Bryant","author_ko":"코비 브라이언트","era":"1978-2020","quote_en":"Mamba mentality is about being the best version of yourself.","quote_ko":"맘바 멘탈리티는 최고의 자신이 되는 것이다.","copyright":"attributed","source":"The Mamba Mentality","motivation_level":"hard"},{"id":"580","category":"growth","time_slot":"DAWN","author":"Kobe Bryant","author_ko":"코비 브라이언트","era":"1978-2020","quote_en":"Great things come from hard work and perseverance. No excuses.","quote_ko":"위대한 것은 노력과 끈기에서 나온다. 변명은 없다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"581","category":"growth","time_slot":"AFTERNOON","author":"Kobe Bryant","author_ko":"코비 브라이언트","era":"1978-2020","quote_en":"If you're afraid to fail, then you're probably going to fail.","quote_ko":"실패를 두려워한다면, 아마 실패할 것이다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"582","category":"growth","time_slot":"DAWN","author":"Muhammad Ali","author_ko":"무하마드 알리","era":"1942-2016","quote_en":"Don't count the days; make the days count.","quote_ko":"날을 세지 마라. 하루하루를 의미 있게 만들어라.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"583","category":"growth","time_slot":"AFTERNOON","author":"Muhammad Ali","author_ko":"무하마드 알리","era":"1942-2016","quote_en":"Float like a butterfly, sting like a bee.","quote_ko":"나비처럼 날아서 벌처럼 쏜다.","copyright":"attributed","source":"Pre-fight","motivation_level":"medium"},{"id":"584","category":"growth","time_slot":"MORNING","author":"Muhammad Ali","author_ko":"무하마드 알리","era":"1942-2016","quote_en":"He who is not courageous enough to take risks will accomplish nothing in life.","quote_ko":"위험을 감수할 용기가 없는 자는 인생에서 아무것도 이루지 못한다.","copyright":"attributed","source":"The Greatest","motivation_level":"hard"},{"id":"585","category":"growth","time_slot":"AFTERNOON","author":"Bruce Lee","author_ko":"브루스 리","era":"1940-1973","quote_en":"Absorb what is useful, discard what is not, add what is uniquely your own.","quote_ko":"유용한 것은 흡수하고, 아닌 것은 버리고, 자신만의 것을 더하라.","copyright":"attributed","source":"Tao of Jeet Kune Do","motivation_level":"medium"},{"id":"586","category":"growth","time_slot":"NIGHT","author":"Bruce Lee","author_ko":"브루스 리","era":"1940-1973","quote_en":"Be water, my friend.","quote_ko":"물이 되어라, 친구여.","copyright":"attributed","source":"Longstreet TV","motivation_level":"medium"},{"id":"587","category":"growth","time_slot":"EVENING","author":"Serena Williams","author_ko":"세레나 윌리엄스","era":"1981-","quote_en":"I really think a champion is defined not by their wins but by how they can recover when they fall.","quote_ko":"챔피언은 승리로 정의되는 것이 아니라 넘어졌을 때 어떻게 회복하는가로 정의된다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"588","category":"growth","time_slot":"AFTERNOON","author":"Tiger Woods","author_ko":"타이거 우즈","era":"1975-","quote_en":"No matter how good you get, you can always get better.","quote_ko":"얼마나 잘하게 되든, 더 잘할 수 있다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"589","category":"growth","time_slot":"MORNING","author":"Cristiano Ronaldo","author_ko":"크리스티아누 호날두","era":"1985-","quote_en":"Your love makes me strong, your hate makes me unstoppable.","quote_ko":"당신의 사랑이 나를 강하게 만들고, 당신의 미움이 나를 멈출 수 없게 만든다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"590","category":"growth","time_slot":"DAWN","author":"Lionel Messi","author_ko":"리오넬 메시","era":"1987-","quote_en":"You have to fight to reach your dream. You have to sacrifice and work hard for it.","quote_ko":"꿈에 닿기 위해 싸워야 한다. 희생하고 노력해야 한다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"591","category":"growth","time_slot":"MORNING","author":"LeBron James","author_ko":"르브론 제임스","era":"1984-","quote_en":"I treated every practice, every workout, every game as if it were my last.","quote_ko":"모든 연습, 모든 훈련, 모든 경기를 마지막인 것처럼 대했다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"592","category":"growth","time_slot":"MORNING","author":"Kim Yuna","author_ko":"김연아","era":"1990-","quote_en":"Practice creates belief, and belief creates miracles.","quote_ko":"연습이 믿음을 만들고, 믿음이 기적을 만든다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"593","category":"growth","time_slot":"EVENING","author":"Kim Yuna","author_ko":"김연아","era":"1990-","quote_en":"I have endured hard times, but they made me who I am.","quote_ko":"힘든 시간을 견뎠고, 그것이 지금의 나를 만들었다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"594","category":"growth","time_slot":"MORNING","author":"Park Ji-sung","author_ko":"박지성","era":"1981-","quote_en":"I am not a genius. I only work harder than others.","quote_ko":"나는 천재가 아니다. 남보다 더 열심히 할 뿐이다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"595","category":"growth","time_slot":"DAWN","author":"Park Chan-ho","author_ko":"박찬호","era":"1973-","quote_en":"When the world doubts you, that is when you must believe in yourself the most.","quote_ko":"세상이 당신을 의심할 때, 바로 그때 자신을 가장 믿어야 한다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"596","category":"growth","time_slot":"MORNING","author":"Son Heung-min","author_ko":"손흥민","era":"1992-","quote_en":"I train with the determination of someone who has nothing to lose.","quote_ko":"잃을 것 없는 사람의 각오로 훈련한다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"597","category":"growth","time_slot":"MORNING","author":"Son Heung-min","author_ko":"손흥민","era":"1992-","quote_en":"Talent without hard work is nothing.","quote_ko":"노력 없는 재능은 아무것도 아니다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"598","category":"growth","time_slot":"AFTERNOON","author":"Usain Bolt","author_ko":"우사인 볼트","era":"1986-","quote_en":"I trained four years to run nine seconds, and people give up when they don't see results in two months.","quote_ko":"9초를 뛰기 위해 4년을 훈련했다. 사람들은 두 달 안에 결과가 없으면 포기한다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"599","category":"growth","time_slot":"DAWN","author":"Simone Biles","author_ko":"시몬 바일스","era" function getCycleInfo() {
  const now = new Date();
  const min = now.getMinutes();
  const sec = now.getSeconds();
  const secOfCycle = min * 60 + sec;
  let phase = 'MUSIC';
  let targetVol = volume;
  if (secOfCycle < 90) {
    phase = 'QUOTE';
    targetVol = Math.max(5, Math.floor(volume * 0.15));
  } else if (secOfCycle > (57 * 60)) {
    phase = 'FADING';
    const elapsed = secOfCycle - (57 * 60);
    const pct = Math.min(1, elapsed / (3 * 60));
    targetVol = Math.floor(volume * (1 - pct * 0.7));
  }
  return { secOfCycle, phase, targetVol, min, sec };
}

function pickQuoteForHour() {
  const h = new Date().getHours();
  const cat = CATS.find(c => h >= c.s && h < c.e) || CATS[CATS.length - 1];
  const pool = QUOTES.filter(q => q.time_slot === cat.slot);
  if (pool.length === 0) return QUOTES[Math.floor(Math.random() * QUOTES.length)];
  const now = new Date();
  const seed = now.getFullYear() * 1000000 + (now.getMonth()+1) * 10000 + now.getDate() * 100 + h;
  return pool[seed % pool.length];
}

function renderQuote(q, withAnim) {
  currentQuote = q;

  const updateText = () => {
    // 영문 블록
    $('quote-en').textContent = `"${q.quote_en}"`;
    $('quote-author').textContent = `— ${q.author}`;
    // 한글 블록
    $('quote-ko').textContent = `"${q.quote_ko}"`;
  };

  if (withAnim) {
    const stage = $('stage');
    // 1단계: 텍스트만 페이드 아웃 (scale 없음)
    stage.classList.add('fade');
    setTimeout(() => {
      updateText();
      // 2단계: 새 텍스트 페이드 인
      stage.classList.remove('fade');
    }, 400);
  } else {

  }
}

    }
  }
  console.log('⚠ FLOW fallback voice:', voices[0]?.name);
  return voices[0] || null;
}

// Serena/Kate 개별 식별 (Premium 우선, 없으면 기본)
function pickNamedVoice(namePattern) {
  if (!('speechSynthesis' in window)) return null;
  const voices = window.speechSynthesis.getVoices();
  const rx = new RegExp(namePattern, 'i');
  // Premium/Enhanced 우선
  return voices.find(v => v.lang === 'en-GB' && rx.test(v.name) && /Premium|Enhanced/i.test(v.name))
      || voices.find(v => v.lang === 'en-GB' && rx.test(v.name))
      || null;
}

function refreshVoices() {
  preferredVoice = pickVoice();
  voiceSerena = pickNamedVoice('Serena');
  voiceKate   = pickNamedVoice('Kate');
  console.log('🎤 FLOW 2-voice system:',
    'Serena=' + (voiceSerena?.name || '없음'),
    '/ Kate=' + (voiceKate?.name || '없음'));
}

// voices가 비동기로 로드됨 → 이벤트로 처리
if ('speechSynthesis' in window) {
  refreshVoices();
  window.speechSynthesis.onvoiceschanged = refreshVoices;
}

function speak(rate, pitch) {
  if (!('speechSynthesis' in window) || !currentQuote) return;
  // 이전 발음 중단
  window.speechSynthesis.cancel();

  // 자연스러운 발음을 위해 문장에 쉼표·마침표 유지
  let text = currentQuote.quote_en.trim();
  if (!/[.!?]$/.test(text)) text += '.';

  // 슬롯별 음성 자동 선택 (Serena=전이/Kate=활동)
  const slotVoice = voiceForSlot(currentSlot);
  const useVoice = slotVoice || preferredVoice;

  const u = new SpeechSynthesisUtterance(text);
  u.lang = useVoice ? useVoice.lang : 'en-GB';
  // 슬롯 프리셋 우선, 인자로 override 가능
  u.rate = rate || 0.62;
  u.pitch = pitch || 0.92;
  u.volume = 1.0;
  if (useVoice) u.voice = useVoice;

  // 음악 볼륨 일시 감쇄 (이미 tick에서 처리됨, 추가 안전장치)
  window.speechSynthesis.speak(u);
}

function speakTwice() {
  const p = VOICE_PRESET[currentSlot] || VOICE_PRESET.NIGHT;
  window.speechSynthesis.cancel();
  speak(p.r1, p.pitch);              // 1차: 슬롯별 깊은 톤
  setTimeout(() => speak(p.r2, p.pitch), p.gap);  // 2차: 슬롯별 여백
}

function onYouTubeIframeAPIReady() {
  yt = new YT.Player('yt-player', {
    height: '1', width: '1',
    videoId: currentSource === 'nature' ? getNatureId() : SOURCES[currentSource].id,
    playerVars: {
      autoplay: 0, controls: 0,
      modestbranding: 1, playsinline: 1
    },
    events: {
      onReady: () => {
        ytReady = true;
        yt.setVolume(volume);
      },
      onStateChange: (e) => {
        if (e.data === YT.PlayerState.PLAYING) {
          isPlaying = true;
          updatePlayBtn();
        } else if (e.data === YT.PlayerState.PAUSED) {
          isPlaying = false;
          updatePlayBtn();
        }
      },
      onError: (e) => {
        toast('⚠ 음악 로딩 오류', 3000);
      }
    }
  });
}
window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

function ytPlay() {
  if (!ytReady) { toast('음악 로딩 중...', 2000); return; }
  try { yt.playVideo(); } catch(e) {}
}
function ytPause() {
  if (!ytReady) return;
  try { yt.pauseVideo(); } catch(e) {}
}
function ytVolume(v) {
  if (!ytReady) return;
  try { yt.setVolume(Math.max(0, Math.min(100, v))); } catch(e) {}
}

function switchSource(key) {
  if (!ytReady || !SOURCES[key]) return;
  currentSource = key;
  document.querySelectorAll('.src-dot').forEach(b => {
    b.classList.toggle('active', b.dataset.src === key);
  });
  try {
    const videoId = (key === 'nature') ? getNatureId() : SOURCES[key].id;
    yt.loadVideoById(videoId);
  } catch(e) {}
}

// 정각(hour 변경)에 nature 재생 중이면 시간대 맞춰 자동 전환
let lastNatureHour = -1;
function checkNatureTransition() {
  if (currentSource !== 'nature' || !ytReady) return;
  const h = new Date().getHours();
  // 6시 전환 또는 18시 전환 지점에서만 바꿈
  if (h === lastNatureHour) return;
  const shouldBeForest = (h >= 6 && h < 18);
  const wasForest = (lastNatureHour >= 6 && lastNatureHour < 18);
  // 낮→밤 또는 밤→낮 전환 시에만 재로드
  if (lastNatureHour !== -1 && shouldBeForest !== wasForest) {
    try { yt.loadVideoById(getNatureId()); } catch(e) {}
  }
  lastNatureHour = h;
}

function updatePlayBtn() {
  $('play-btn').textContent = isPlaying ? '❚❚' : '▶';
}

function updateSliderFill() {
  const s = $('vol-slider');
  if (!s) return;
  const pct = volume;
  s.style.background = `linear-gradient(to right, #F5F5F7 0%, #F5F5F7 ${pct}%, rgba(255,255,255,0.18) ${pct}%, rgba(255,255,255,0.18) 100%)`;
  if (s.value != volume) s.value = volume;
}

function setUserVolume(v) {
  volume = Math.max(0, Math.min(100, v));
  ytVolume(volume);
  updateSliderFill();
}

let lastHour = -1;

function tick() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();

  if (h !== lastHour) {
    lastHour = h;
    updateBadge();
    const q = pickQuoteForHour();
    renderQuote(q, true);
    if (m === 0 && s < 10) {
      setTimeout(() => speakTwice(), 800);
    }
  }

  const secInHour = m * 60 + s;
  const pct = (secInHour / 3600) * 100;
  $('progress-fill').style.width = pct + '%';

  const cyc = getCycleInfo();
  if (isPlaying && ytReady) {
    ytVolume(cyc.targetVol);
  }
  // NATURE 재생 중이면 시간대 체크
  checkNatureTransition();
}

function enterFlow() {
  $('gate').classList.add('hidden');
  updateBadge();
  const q = pickQuoteForHour();
  renderQuote(q, true);
  lastHour = new Date().getHours();
  toast('음악 로딩 중...', 2000);
  setTimeout(() => {
    ytPlay();
    setTimeout(() => {
      const p = VOICE_PRESET[currentSlot] || VOICE_PRESET.NIGHT;
      speak(p.r1, p.pitch);
    }, 1800);
  }, 800);
}

function init() {
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.body.appendChild(tag);

  updateBadge();
  const q = pickQuoteForHour();
  renderQuote(q, false);
  // volume label removed (Jobs edition)

  $('gate-btn').addEventListener('click', enterFlow);
  $('play-btn').addEventListener('click', () => isPlaying ? ytPause() : ytPlay());
  // 명언 영역: 클릭 = 새 명언 + 자동 발음
  $('stage').addEventListener('click', (e) => {
    const h = new Date().getHours();
    const cat = CATS.find(c => h >= c.s && h < c.e) || CATS[CATS.length - 1];
    const pool = QUOTES.filter(q => q.time_slot === cat.slot);
    let next = pool[Math.floor(Math.random() * pool.length)];
    while (next === currentQuote && pool.length > 1) {
      next = pool[Math.floor(Math.random() * pool.length)];
    }
    renderQuote(next, true);
    // 명언 전환 후 슬롯별 자동 톤 + 5.5초 후 2회차 (속도 다르게)
    setTimeout(() => {
      const p = VOICE_PRESET[currentSlot] || VOICE_PRESET.NIGHT;
      speak(p.r1, p.pitch);
      setTimeout(() => speak(p.r2, p.pitch), p.gap);
    }, 600);
  });
  $('vol-slider').addEventListener('input', (e) => setUserVolume(parseInt(e.target.value, 10)));
  updateSliderFill();
  $('fs-btn').addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  });

  document.querySelectorAll('.src-dot').forEach(b => {
    b.addEventListener('click', () => switchSource(b.dataset.src));
  });

  document.addEventListener('keydown', (e) => {
    if (!$('gate').classList.contains('hidden')) {
      if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); enterFlow(); }
      return;
    }
    if (e.code === 'Space') { e.preventDefault(); isPlaying ? ytPause() : ytPlay(); }
    if (e.code === 'KeyS') {
      const p = VOICE_PRESET[currentSlot] || VOICE_PRESET.NIGHT;
      speak(p.r1, p.pitch);
    }
    if (e.code === 'KeyN') {
      // 새 명언 (키보드)
      const h = new Date().getHours();
      const cat = CATS.find(c => h >= c.s && h < c.e) || CATS[CATS.length - 1];
      const pool = QUOTES.filter(q => q.time_slot === cat.slot);
      let next = pool[Math.floor(Math.random() * pool.length)];
      while (next === currentQuote && pool.length > 1) {
        next = pool[Math.floor(Math.random() * pool.length)];
      }
      renderQuote(next, true);
    }
    if (e.code === 'KeyF') $('fs-btn').click();
    if (e.code === 'ArrowUp')   { e.preventDefault(); setUserVolume(volume + 5); }
    if (e.code === 'ArrowDown') { e.preventDefault(); setUserVolume(volume - 5); }
  });

  setInterval(tick, 1000);
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>
</body>
</html>
