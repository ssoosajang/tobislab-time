<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0A0A0F;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    color: #F5F5F7;
    transition: background 800ms ease;
  }
  body.slot-dawn      { background: radial-gradient(ellipse at top, #3a1a0f 0%, #0A0A0F 70%); }
  body.slot-morning   { background: radial-gradient(ellipse at top, #3a2810 0%, #0A0A0F 70%); }
  body.slot-noon      { background: radial-gradient(ellipse at top, #0f2a1c 0%, #0A0A0F 70%); }
  body.slot-afternoon { background: radial-gradient(ellipse at top, #0f1e3a 0%, #0A0A0F 70%); }
  body.slot-evening   { background: radial-gradient(ellipse at top, #2a1238 0%, #0A0A0F 70%); }
  body.slot-night     { background: radial-gradient(ellipse at top, #161638 0%, #0A0A0F 70%); }

  /* 전체 레이아웃: 세로 flex로 깔끔하게 */
  #app {
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    position: relative;
  }

  /* ============ TOP BAR ============ */
  .top-bar {
    flex: 0 0 auto;
    display: flex; justify-content: space-between; align-items: center;
    padding: 3vh 4vw 0;
    z-index: 10;
    min-height: 10vh;
  }
  .cat-wrap { display: flex; align-items: center; gap: 10px; }

  .cat-badge {
    font-size: 12px; letter-spacing: 0.18em; font-weight: 500;
    color: rgba(245,245,247,0.85);
  }
  .top-btns { display: flex; gap: 10px; align-items: center; }
  .btn {
    background: rgba(255,255,255,0.06);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    padding: 6px 14px; font-size: 12px;
    color: rgba(245,245,247,0.75);
    cursor: pointer; font-family: inherit;
    transition: all 200ms; min-width: 36px;
    line-height: 1;
    letter-spacing: 0.04em;
    backdrop-filter: blur(8px);
  }
  .btn:hover { background: rgba(255,255,255,0.1); color: #F5F5F7; }

  /* ============ VOLUME SLIDER (v19) ============ */
  .vol-wrap {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 14px;
    background: rgba(255,255,255,0.06);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    backdrop-filter: blur(8px);
    transition: all 200ms;
  }
  .vol-wrap:hover { background: rgba(255,255,255,0.1); }
  .vol-icon {
    width: 14px; height: 14px;
    color: rgba(245,245,247,0.75);
    flex-shrink: 0;
    transition: color 200ms;
  }
  .vol-wrap:hover .vol-icon { color: #F5F5F7; }
  .vol-slider {
    -webkit-appearance: none; appearance: none;
    width: 110px; height: 3px;
    background: linear-gradient(to right, #F5F5F7 0%, #F5F5F7 60%, rgba(255,255,255,0.18) 60%, rgba(255,255,255,0.18) 100%);
    border-radius: 3px;
    cursor: pointer;
    outline: none;
    margin: 0;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 11px; height: 11px;
    background: #F5F5F7;
    border-radius: 50%;
    cursor: pointer;
    border: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    transition: transform 200ms;
  }
  .vol-slider::-webkit-slider-thumb:hover { transform: scale(1.25); }
  .vol-slider::-moz-range-thumb {
    width: 11px; height: 11px;
    background: #F5F5F7;
    border-radius: 50%;
    cursor: pointer;
    border: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }


  /* ============ MIDDLE: QUOTE (중앙 메인 영역) ============ */
  .stage {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 4vh 7vw 6vh;
    overflow: hidden;
    cursor: pointer;
    user-select: none;
    min-height: 55vh;
  }


  .quote-en {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(28px, 3.4vw, 52px);
    font-weight: 500;
    text-align: center; line-height: 1.32;
    margin-bottom: 40px;
    max-width: 1100px;
    color: #F5F5F7;
    transition: opacity 800ms ease;
    letter-spacing: -0.005em;
  }
  .stage.fade .quote-en,
  .stage.fade .quote-meta,
  .stage.fade .quote-ko {
    opacity: 0;
  }
  .quote-ko {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(14px, 1.1vw, 16px);
    font-weight: 300;
    color: rgba(245,245,247,0.55);
    text-align: center; max-width: 760px;
    line-height: 1.6;
    letter-spacing: 0.01em;
    margin-bottom: 28px;
  }
  .quote-meta {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 0;
  }
  .quote-author {
    font-size: clamp(12px, 1.0vw, 14px);
    color: rgba(245,245,247,0.5);
    letter-spacing: 0.02em;
  }

  /* ============ BOTTOM: 수직 분리된 6개 영역 ============ */
  .bottom-stack {
    flex: 0 0 auto;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 0 3vw 5vh;
    min-height: 30vh;
    justify-content: flex-end;
  }

  /* 1. 진행바 */
  .progress-section {
    width: 100%;
    max-width: 560px;
    display: flex; flex-direction: column;
    align-items: center;
    margin-bottom: 32px;
  }
  .progress {
    width: 100%;
    height: 1.5px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: rgba(255,255,255,0.3);
    width: 0%;
    transition: width 1s linear;
  }


  /* 2. 컨트롤 버튼 */
  .controls {
    display: flex; gap: 12px; align-items: center;
  }
  .play-btn {
    background: rgba(255,255,255,0.1);
    border: 0.5px solid rgba(255,255,255,0.2);
    color: #F5F5F7;
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px;
    transition: all 200ms;
    backdrop-filter: blur(8px);
  }
  .play-btn:hover { background: rgba(255,255,255,0.18); transform: scale(1.05); }
  .play-btn.primary {
    background: rgba(245,245,247,0.65);
    color: #0A0A0F;
    border-color: transparent;
    width: 52px; height: 52px;
    font-size: 18px;
  }
  .play-btn.primary:hover { background: rgba(245,245,247,0.85); }

  /* 3. 음원 선택 버튼 */
  .source-switcher {
    display: flex; gap: 14px;
    align-items: center; justify-content: center;
    margin-bottom: 40px;
  }
  .src-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    border: none;
    cursor: pointer;
    padding: 0;
    transition: all 300ms ease;
  }
  .src-dot:hover {
    background: rgba(255,255,255,0.6);
    transform: scale(1.15);
  }
  .src-dot.active {
    background: rgba(255,255,255,0.9);
    box-shadow: 0 0 10px rgba(255,255,255,0.25);
  }

  /* 3. 푸터 */
  .footer {
    font-size: 9px;
    color: rgba(245,245,247,0.25);
    letter-spacing: 0.2em;
  }

  /* ============ GATE ============ */
  .gate {
    position: fixed; inset: 0;
    background: rgba(10, 10, 15, 0.96);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    backdrop-filter: blur(20px);
    transition: opacity 600ms;
  }
  .gate.hidden { opacity: 0; pointer-events: none; }
  .gate-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(40px, 5vw, 72px);
    font-weight: 500; margin-bottom: 48px;
    letter-spacing: 0.04em;
  }

  .gate-btn {
    background: transparent;
    color: #F5F5F7;
    border: 0.5px solid rgba(255,255,255,0.3);
    padding: 16px 56px;
    font-size: 11px; font-weight: 400;
    letter-spacing: 0.3em;
    border-radius: 100px;
    cursor: pointer;
    transition: all 400ms ease;
  }
  .gate-btn:hover {
    background: #F5F5F7;
    color: #0A0A0F;
    border-color: #F5F5F7;
  }
  .gate-meta {
    position: absolute; bottom: 4vh;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(245,245,247,0.3);
  }
  .gate-meta a {
    color: inherit;
    text-decoration: none;
    transition: opacity 200ms ease, color 200ms ease;
  }
  .gate-meta a:hover { opacity: 1; color: rgba(245,245,247,0.75); }

  .beta-tag {
    display: inline-block;
    font-family: -apple-system, "SF Pro Display", sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: rgba(245,245,247,0.4);
    vertical-align: super;
    margin-left: 14px;
    position: relative;
    top: -0.5em;
  }

  /* ============ YouTube Player (화면에서 거의 안 보이게) ============ */
  #yt-wrap {
    position: fixed;
    bottom: 0; right: 0;
    width: 1px; height: 1px;
    overflow: hidden;
    pointer-events: none;
    opacity: 0;
  }
  #yt-player { width: 100%; height: 100%; }

  /* ============ TOAST ============ */
  .toast {
    position: fixed; top: 70px; left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.12);
    border: 0.5px solid rgba(255,255,255,0.2);
    color: #F5F5F7;
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 12px;
    z-index: 50;
    opacity: 0;
    transition: opacity 400ms;
    backdrop-filter: blur(10px);
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 768px) {
    .quote-en { font-size: 22px; }
    .bottom-stack { gap: 12px; padding-bottom: 2vh; }
  }
</style>
</head>

    <!-- 4. 푸터 -->

  </div>
</div>

<script>
const QUOTES = [{"id":"001","category":"classic","time_slot":"MORNING","author":"Aristotle","author_ko":"아리스토텔레스","era":"384-322 BC","quote_en":"We are what we repeatedly do. Excellence, then, is not an act, but a habit.","quote_ko":"우리는 반복해서 행동하는 그대로의 존재다. 탁월함은 행위가 아니라 습관이다.","copyright":"public_domain","source":"Nicomachean Ethics","motivation_level":"calm"},{"id":"002","category":"classic","time_slot":"EVENING","author":"Marcus Aurelius","author_ko":"마르쿠스 아우렐리우스","era":"121-180 AD","quote_en":"The happiness of your life depends upon the quality of your thoughts.","quote_ko":"삶의 행복은 생각의 질에 달려 있다.","copyright":"public_domain","source":"Meditations","motivation_level":"calm"},{"id":"003","category":"classic","time_slot":"MORNING","author":"Confucius","author_ko":"공자","era":"551-479 BC","quote_en":"It does not matter how slowly you go as long as you do not stop.","quote_ko":"멈추지 않는 한, 얼마나 천천히 가는지는 중요하지 않다.","copyright":"public_domain","source":"Analects","motivation_level":"calm"},{"id":"004","category":"classic","time_slot":"DAWN","author":"Seneca","author_ko":"세네카","era":"4 BC-65 AD","quote_en":"Every new beginning comes from some other beginning's end.","quote_ko":"모든 새로운 시작은 다른 시작의 끝에서 온다.","copyright":"public_domain","source":"Letters","motivation_level":"calm"},{"id":"005","category":"classic","time_slot":"DAWN","author":"Lao Tzu","author_ko":"노자","era":"6C BC","quote_en":"A journey of a thousand miles begins with a single step.","quote_ko":"천 리 길도 한 걸음부터 시작된다.","copyright":"public_domain","source":"Tao Te Ching","motivation_level":"calm"},{"id":"006","category":"classic","time_slot":"DAWN","author":"Plato","author_ko":"플라톤","era":"428-348 BC","quote_en":"The beginning is the most important part of the work.","quote_ko":"시작이 일의 가장 중요한 부분이다.","copyright":"public_domain","source":"Republic","motivation_level":"calm"},{"id":"007","category":"classic","time_slot":"NIGHT","author":"Heraclitus","author_ko":"헤라클레이토스","era":"535-475 BC","quote_en":"No man ever steps in the same river twice.","quote_ko":"그 누구도 같은 강물에 두 번 발을 담글 수 없다.","copyright":"public_domain","source":"Fragments","motivation_level":"calm"},{"id":"008","category":"classic","time_slot":"MORNING","author":"Epictetus","author_ko":"에픽테토스","era":"50-135 AD","quote_en":"First say to yourself what you would be; and then do what you have to do.","quote_ko":"먼저 어떤 사람이 될지 스스로에게 말하라. 그리고 해야 할 일을 하라.","copyright":"public_domain","source":"Discourses","motivation_level":"calm"},{"id":"009","category":"classic","time_slot":"AFTERNOON","author":"Sun Tzu","author_ko":"손자","era":"544-496 BC","quote_en":"In the midst of chaos, there is also opportunity.","quote_ko":"혼돈 속에도 기회는 있다.","copyright":"public_domain","source":"The Art of War","motivation_level":"calm"},{"id":"010","category":"classic","time_slot":"EVENING","author":"Cicero","author_ko":"키케로","era":"106-43 BC","quote_en":"While there's life, there's hope.","quote_ko":"생명이 있는 한 희망은 있다.","copyright":"public_domain","source":"Letters","motivation_level":"calm"},{"id":"011","category":"classic","time_slot":"DAWN","author":"Virgil","author_ko":"베르길리우스","era":"70-19 BC","quote_en":"Fortune favors the bold.","quote_ko":"운명은 용감한 자의 편이다.","copyright":"public_domain","source":"Aeneid","motivation_level":"hard"},{"id":"012","category":"classic","time_slot":"DAWN","author":"Horace","author_ko":"호라티우스","era":"65-8 BC","quote_en":"Seize the day, trust as little as possible in the future.","quote_ko":"오늘을 잡아라, 내일은 되도록 믿지 마라.","copyright":"public_domain","source":"Odes","motivation_level":"hard"},{"id":"013","category":"classic","time_slot":"NIGHT","author":"Socrates","author_ko":"소크라테스","era":"470-399 BC","quote_en":"The unexamined life is not worth living.","quote_ko":"성찰하지 않는 삶은 살 가치가 없다.","copyright":"public_domain","source":"Apology","motivation_level":"calm"},{"id":"014","category":"classic","time_slot":"EVENING","author":"Epicurus","author_ko":"에피쿠로스","era":"341-270 BC","quote_en":"Not what we have, but what we enjoy, constitutes our abundance.","quote_ko":"우리가 가진 것이 아니라, 누리는 것이 풍요를 만든다.","copyright":"public_domain","source":"Fragments","motivation_level":"calm"},{"id":"015","category":"classic","time_slot":"NIGHT","author":"Pythagoras","author_ko":"피타고라스","era":"570-495 BC","quote_en":"Silence is better than unmeaning words.","quote_ko":"침묵은 공허한 말보다 낫다.","copyright":"public_domain","source":"Golden Verses","motivation_level":"calm"},{"id":"016","category":"classic","time_slot":"EVENING","author":"Mencius","author_ko":"맹자","era":"372-289 BC","quote_en":"The great man is he who does not lose his child's heart.","quote_ko":"위대한 사람은 어린아이의 마음을 잃지 않는 사람이다.","copyright":"public_domain","source":"Mencius","motivation_level":"calm"},{"id":"017","category":"classic","time_slot":"NIGHT","author":"Zhuangzi","author_ko":"장자","era":"369-286 BC","quote_en":"Happiness is the absence of the striving for happiness.","quote_ko":"행복은 행복을 좇지 않을 때 온다.","copyright":"public_domain","source":"Zhuangzi","motivation_level":"calm"},{"id":"018","category":"classic","time_slot":"EVENING","author":"Sophocles","author_ko":"소포클레스","era":"497-406 BC","quote_en":"Wisdom outweighs any wealth.","quote_ko":"지혜는 어떤 부보다 무겁다.","copyright":"public_domain","source":"Antigone","motivation_level":"calm"},{"id":"019","category":"classic","time_slot":"NOON","author":"Euripides","author_ko":"에우리피데스","era":"480-406 BC","quote_en":"The best and safest thing is to keep a balance in your life.","quote_ko":"삶의 균형을 유지하는 것이 가장 좋고 안전하다.","copyright":"public_domain","source":"Plays","motivation_level":"calm"},{"id":"020","category":"classic","time_slot":"NIGHT","author":"Homer","author_ko":"호메로스","era":"8C BC","quote_en":"Any moment might be our last. Everything is more beautiful because we're doomed.","quote_ko":"모든 순간이 마지막일 수 있기에, 모든 것은 더 아름답다.","copyright":"public_domain","source":"Iliad","motivation_level":"calm"},{"id":"021","category":"classic","time_slot":"EVENING","author":"Dante Alighieri","author_ko":"단테","era":"1265-1321","quote_en":"The path to paradise begins in hell.","quote_ko":"천국으로 가는 길은 지옥에서 시작된다.","copyright":"public_domain","source":"Divine Comedy","motivation_level":"calm"},{"id":"022","category":"classic","time_slot":"NOON","author":"Leonardo da Vinci","author_ko":"레오나르도 다 빈치","era":"1452-1519","quote_en":"Simplicity is the ultimate sophistication.","quote_ko":"단순함은 궁극의 정교함이다.","copyright":"public_domain","source":"Notebooks","motivation_level":"calm"},{"id":"023","category":"classic","time_slot":"DAWN","author":"Michelangelo","author_ko":"미켈란젤로","era":"1475-1564","quote_en":"The greater danger is not that our aim is too high, but that it is too low.","quote_ko":"더 큰 위험은 목표가 너무 높은 것이 아니라 너무 낮은 것이다.","copyright":"public_domain","source":"Letters","motivation_level":"calm"},{"id":"024","category":"classic","time_slot":"NIGHT","author":"William Shakespeare","author_ko":"셰익스피어","era":"1564-1616","quote_en":"We know what we are, but know not what we may be.","quote_ko":"우리는 지금의 자신은 알지만, 장차 어떤 존재가 될지는 모른다.","copyright":"public_domain","source":"Hamlet","motivation_level":"calm"},{"id":"025","category":"classic","time_slot":"EVENING","author":"Miguel de Cervantes","author_ko":"세르반테스","era":"1547-1616","quote_en":"The truth may be stretched thin, but it never breaks.","quote_ko":"진실은 얇게 늘어질 수는 있어도 결코 끊어지지 않는다.","copyright":"public_domain","source":"Don Quixote","motivation_level":"calm"},{"id":"026","category":"classic","time_slot":"EVENING","author":"Voltaire","author_ko":"볼테르","era":"1694-1778","quote_en":"Judge a man by his questions rather than by his answers.","quote_ko":"사람은 답이 아니라 질문으로 판단하라.","copyright":"public_domain","source":"Essays","motivation_level":"calm"},{"id":"027","category":"classic","time_slot":"MORNING","author":"Jean-Jacques Rousseau","author_ko":"루소","era":"1712-1778","quote_en":"Patience is bitter, but its fruit is sweet.","quote_ko":"인내는 쓰지만 그 열매는 달다.","copyright":"public_domain","source":"Emile","motivation_level":"calm"},{"id":"028","category":"classic","time_slot":"MORNING","author":"Immanuel Kant","author_ko":"칸트","era":"1724-1804","quote_en":"Act only according to that maxim by which you can will that it become universal law.","quote_ko":"보편 법칙이 되길 바랄 수 있는 준칙에 따라서만 행동하라.","copyright":"public_domain","source":"Groundwork","motivation_level":"calm"},{"id":"029","category":"classic","time_slot":"DAWN","author":"Johann Wolfgang von Goethe","author_ko":"괴테","era":"1749-1832","quote_en":"Whatever you can do or dream, begin it. Boldness has genius, power and magic in it.","quote_ko":"할 수 있거나 꿈꾸는 것이 있다면 시작하라. 대담함에는 천재성과 힘과 마법이 있다.","copyright":"public_domain","source":"Faust","motivation_level":"hard"},{"id":"030","category":"classic","time_slot":"EVENING","author":"Ralph Waldo Emerson","author_ko":"에머슨","era":"1803-1882","quote_en":"To be yourself in a world that is constantly trying to make you something else is the greatest accomplishment.","quote_ko":"끊임없이 너를 다른 것으로 만들려는 세상에서 자기 자신으로 사는 것이 가장 위대한 성취다.","copyright":"public_domain","source":"Essays","motivation_level":"calm"},{"id":"031","category":"classic","time_slot":"DAWN","author":"Henry David Thoreau","author_ko":"소로우","era":"1817-1862","quote_en":"Go confidently in the direction of your dreams. Live the life you have imagined.","quote_ko":"꿈의 방향으로 자신있게 나아가라. 상상했던 삶을 살아라.","copyright":"public_domain","source":"Walden","motivation_level":"calm"},{"id":"032","category":"classic","time_slot":"EVENING","author":"Friedrich Nietzsche","author_ko":"니체","era":"1844-1900","quote_en":"He who has a why to live can bear almost any how.","quote_ko":"삶의 이유를 가진 자는 거의 어떤 방식이든 견뎌낼 수 있다.","copyright":"public_domain","source":"Twilight of the Idols","motivation_level":"calm"},{"id":"033","category":"classic","time_slot":"EVENING","author":"Leo Tolstoy","author_ko":"톨스토이","era":"1828-1910","quote_en":"Everyone thinks of changing the world, but no one thinks of changing himself.","quote_ko":"모두가 세상을 바꿀 생각을 하지만, 자신을 바꿀 생각은 하지 않는다.","copyright":"public_domain","source":"A Confession","motivation_level":"calm"},{"id":"034","category":"classic","time_slot":"EVENING","author":"Fyodor Dostoevsky","author_ko":"도스토옙스키","era":"1821-1881","quote_en":"The mystery of human existence lies not in just staying alive, but in finding something to live for.","quote_ko":"인간 존재의 신비는 단지 살아있음이 아니라 살아갈 무엇을 찾는 데 있다.","copyright":"public_domain","source":"The Brothers Karamazov","motivation_level":"calm"},{"id":"035","category":"classic","time_slot":"NIGHT","author":"Mark Twain","author_ko":"마크 트웨인","era":"1835-1910","quote_en":"The two most important days in your life are the day you are born and the day you find out why.","quote_ko":"인생에서 가장 중요한 두 날은 태어난 날과 태어난 이유를 찾은 날이다.","copyright":"public_domain","source":"Notebook","motivation_level":"calm"},{"id":"036","category":"classic","time_slot":"NIGHT","author":"Oscar Wilde","author_ko":"오스카 와일드","era":"1854-1900","quote_en":"Be yourself; everyone else is already taken.","quote_ko":"너 자신이 되어라. 다른 모든 사람은 이미 누군가에게 속해있다.","copyright":"public_domain","source":"Essays","motivation_level":"calm"},{"id":"037","category":"classic","time_slot":"NIGHT","author":"Rainer Maria Rilke","author_ko":"릴케","era":"1875-1926","quote_en":"The only journey is the one within.","quote_ko":"유일한 여행은 내면으로의 여행이다.","copyright":"public_domain","source":"Letters to a Young Poet","motivation_level":"calm"},{"id":"038","category":"classic","time_slot":"NIGHT","author":"Marcel Proust","author_ko":"프루스트","era":"1871-1922","quote_en":"The real voyage of discovery consists not in seeking new landscapes, but in having new eyes.","quote_ko":"진정한 발견의 여행은 새로운 풍경을 찾는 것이 아니라 새로운 눈을 갖는 것이다.","copyright":"public_domain","source":"In Search of Lost Time","motivation_level":"calm"},{"id":"039","category":"classic","time_slot":"NIGHT","author":"Rumi","author_ko":"루미","era":"1207-1273","quote_en":"The wound is the place where the light enters you.","quote_ko":"상처는 빛이 들어오는 자리다.","copyright":"public_domain","source":"Masnavi","motivation_level":"calm"},{"id":"040","category":"classic","time_slot":"NIGHT","author":"Matsuo Basho","author_ko":"마쓰오 바쇼","era":"1644-1694","quote_en":"Every day is a journey, and the journey itself is home.","quote_ko":"매일이 여행이며, 여행 그 자체가 집이다.","copyright":"public_domain","source":"Oku no Hosomichi","motivation_level":"calm"},{"id":"041","category":"classic","time_slot":"NIGHT","author":"Hafiz","author_ko":"하피즈","era":"1315-1390","quote_en":"I wish I could show you when you are lonely or in darkness the astonishing light of your own being.","quote_ko":"외롭거나 어둠 속에 있을 때, 네 존재의 놀라운 빛을 보여주고 싶다.","copyright":"public_domain","source":"Divan","motivation_level":"calm"},{"id":"042","category":"classic","time_slot":"NIGHT","author":"Kahlil Gibran","author_ko":"칼릴 지브란","era":"1883-1931","quote_en":"Out of suffering have emerged the strongest souls; the most massive characters are seared with scars.","quote_ko":"고통 속에서 가장 강한 영혼이 태어나고, 가장 위대한 인격은 상처로 새겨진다.","copyright":"public_domain","source":"The Prophet","motivation_level":"calm"},{"id":"043","category":"classic","time_slot":"DAWN","author":"Walt Whitman","author_ko":"월트 휘트먼","era":"1819-1892","quote_en":"Keep your face always toward the sunshine—and shadows will fall behind you.","quote_ko":"항상 햇빛을 향해 얼굴을 두어라. 그러면 그림자는 뒤로 진다.","copyright":"public_domain","source":"Leaves of Grass","motivation_level":"hard"},{"id":"044","category":"classic","time_slot":"EVENING","author":"Emily Dickinson","author_ko":"에밀리 디킨슨","era":"1830-1886","quote_en":"Hope is the thing with feathers that perches in the soul.","quote_ko":"희망은 영혼에 깃든 깃털 달린 것이다.","copyright":"public_domain","source":"Poems","motivation_level":"calm"},{"id":"045","category":"classic","time_slot":"DAWN","author":"Victor Hugo","author_ko":"빅토르 위고","era":"1802-1885","quote_en":"Even the darkest night will end and the sun will rise.","quote_ko":"가장 어두운 밤도 끝나고 해는 떠오른다.","copyright":"public_domain","source":"Les Misérables","motivation_level":"calm"},{"id":"046","category":"classic","time_slot":"EVENING","author":"Charles Dickens","author_ko":"찰스 디킨스","era":"1812-1870","quote_en":"No one is useless in this world who lightens the burdens of another.","quote_ko":"다른 이의 짐을 덜어주는 사람은 이 세상에 쓸모없지 않다.","copyright":"public_domain","source":"Our Mutual Friend","motivation_level":"calm"},{"id":"047","category":"classic","time_slot":"EVENING","author":"Jane Austen","author_ko":"제인 오스틴","era":"1775-1817","quote_en":"There is no charm equal to tenderness of heart.","quote_ko":"따뜻한 마음에 견줄 매력은 없다.","copyright":"public_domain","source":"Emma","motivation_level":"calm"},{"id":"048","category":"classic","time_slot":"MORNING","author":"Benjamin Franklin","author_ko":"벤저민 프랭클린","era":"1706-1790","quote_en":"An investment in knowledge pays the best interest.","quote_ko":"지식에 대한 투자가 최고의 이자를 낳는다.","copyright":"public_domain","source":"Almanac","motivation_level":"calm"},{"id":"049","category":"classic","time_slot":"MORNING","author":"Thomas Jefferson","author_ko":"토머스 제퍼슨","era":"1743-1826","quote_en":"I'm a great believer in luck, and I find the harder I work, the more I have of it.","quote_ko":"나는 운을 믿는다. 그리고 더 열심히 일할수록 운이 더 많아진다는 것을 안다.","copyright":"public_domain","source":"Letters","motivation_level":"hard"},{"id":"050","category":"classic","time_slot":"DAWN","author":"Abraham Lincoln","author_ko":"링컨","era":"1809-1865","quote_en":"The best way to predict your future is to create it.","quote_ko":"미래를 예측하는 최선의 방법은 그것을 만드는 것이다.","copyright":"attributed","source":"Attributed","motivation_level":"calm"},{"id":"051","category":"classic","time_slot":"EVENING","author":"Friedrich Schiller","author_ko":"실러","era":"1759-1805","quote_en":"He who has done his best for his own time has lived for all times.","quote_ko":"자기 시대를 위해 최선을 다한 자는 모든 시대를 위해 산 것이다.","copyright":"public_domain","source":"Letters","motivation_level":"calm"},{"id":"052","category":"classic","time_slot":"EVENING","author":"Arthur Schopenhauer","author_ko":"쇼펜하우어","era":"1788-1860","quote_en":"Talent hits a target no one else can hit; genius hits a target no one else can see.","quote_ko":"재능은 다른 이가 맞출 수 없는 과녁을 맞춘다. 천재는 다른 이가 보지 못하는 과녁을 맞춘다.","copyright":"public_domain","source":"Essays","motivation_level":"calm"},{"id":"053","category":"classic","time_slot":"NIGHT","author":"Søren Kierkegaard","author_ko":"키르케고르","era":"1813-1855","quote_en":"Life can only be understood backwards; but it must be lived forwards.","quote_ko":"삶은 뒤돌아봐야 이해되지만, 앞을 향해 살아야 한다.","copyright":"public_domain","source":"Journals","motivation_level":"hard"},{"id":"054","category":"classic","time_slot":"MORNING","author":"Anton Chekhov","author_ko":"체호프","era":"1860-1904","quote_en":"Knowledge is of no value unless you put it into practice.","quote_ko":"지식은 실천하지 않으면 가치가 없다.","copyright":"public_domain","source":"Letters","motivation_level":"calm"},{"id":"055","category":"classic","time_slot":"NOON","author":"Herman Melville","author_ko":"허먼 멜빌","era":"1819-1891","quote_en":"It is better to fail in originality than to succeed in imitation.","quote_ko":"모방으로 성공하는 것보다 독창성으로 실패하는 것이 낫다.","copyright":"public_domain","source":"Moby-Dick","motivation_level":"hard"},{"id":"056","category":"classic","time_slot":"NIGHT","author":"Nathaniel Hawthorne","author_ko":"호손","era":"1804-1864","quote_en":"Happiness is a butterfly, which when pursued, is always beyond your grasp.","quote_ko":"행복은 좇으면 늘 손에 닿지 않는 나비와 같다.","copyright":"public_domain","source":"Notebooks","motivation_level":"calm"},{"id":"057","category":"classic","time_slot":"AFTERNOON","author":"Henry Wadsworth Longfellow","author_ko":"롱펠로우","era":"1807-1882","quote_en":"The heights by great men reached and kept were not attained by sudden flight.","quote_ko":"위인이 도달한 높이는 갑작스런 비상으로 얻은 것이 아니다.","copyright":"public_domain","source":"The Ladder of St. Augustine","motivation_level":"calm"},{"id":"058","category":"classic","time_slot":"AFTERNOON","author":"Louisa May Alcott","author_ko":"루이자 메이 올컷","era":"1832-1888","quote_en":"I am not afraid of storms, for I am learning how to sail my ship.","quote_ko":"나는 폭풍이 두렵지 않다. 내 배를 다루는 법을 배우는 중이기 때문이다.","copyright":"public_domain","source":"Little Women","motivation_level":"calm"},{"id":"059","category":"classic","time_slot":"EVENING","author":"Charlotte Brontë","author_ko":"샬럿 브론테","era":"1816-1855","quote_en":"Life appears to me too short to be spent in nursing animosity.","quote_ko":"원한을 품고 보내기엔 인생이 너무 짧게 느껴진다.","copyright":"public_domain","source":"Jane Eyre","motivation_level":"calm"},{"id":"060","category":"classic","time_slot":"DAWN","author":"Robert Browning","author_ko":"로버트 브라우닝","era":"1812-1889","quote_en":"A man's reach should exceed his grasp, or what's a heaven for?","quote_ko":"인간의 손이 닿을 수 있는 범위를 넘어서야 한다. 그렇지 않으면 천국이 왜 있겠는가?","copyright":"public_domain","source":"Poems","motivation_level":"calm"},{"id":"061","category":"classic","time_slot":"NOON","author":"John Keats","author_ko":"존 키츠","era":"1795-1821","quote_en":"A thing of beauty is a joy forever.","quote_ko":"아름다운 것은 영원한 기쁨이다.","copyright":"public_domain","source":"Endymion","motivation_level":"calm"},{"id":"062","category":"classic","time_slot":"NIGHT","author":"Lord Byron","author_ko":"바이런","era":"1788-1824","quote_en":"The great art of life is sensation, to feel that we exist, even in pain.","quote_ko":"삶의 위대한 기술은 감각, 고통 속에서도 우리가 존재함을 느끼는 것이다.","copyright":"public_domain","source":"Letters","motivation_level":"calm"},{"id":"063","category":"classic","time_slot":"NIGHT","author":"Percy Shelley","author_ko":"셸리","era":"1792-1822","quote_en":"Fear not for the future, weep not for the past.","quote_ko":"미래를 두려워하지 말고 과거를 슬퍼하지 마라.","copyright":"public_domain","source":"Poems","motivation_level":"calm"},{"id":"064","category":"classic","time_slot":"MORNING","author":"Samuel Johnson","author_ko":"새뮤얼 존슨","era":"1709-1784","quote_en":"What we hope ever to do with ease, we must learn first to do with diligence.","quote_ko":"쉽게 해내길 바라는 일은 먼저 성실히 하는 법을 배워야 한다.","copyright":"public_domain","source":"Rasselas","motivation_level":"calm"},{"id":"065","category":"classic","time_slot":"NOON","author":"David Hume","author_ko":"흄","era":"1711-1776","quote_en":"Beauty in things exists in the mind which contemplates them.","quote_ko":"사물의 아름다움은 그것을 바라보는 마음에 존재한다.","copyright":"public_domain","source":"Essays","motivation_level":"calm"},{"id":"066","category":"classic","time_slot":"NIGHT","author":"John Locke","author_ko":"존 로크","era":"1632-1704","quote_en":"Reading furnishes the mind only with materials of knowledge; it is thinking that makes what we read ours.","quote_ko":"독서는 마음에 지식의 재료만 준다. 읽은 것을 우리의 것으로 만드는 것은 사고다.","copyright":"public_domain","source":"Essay Concerning Human Understanding","motivation_level":"calm"},{"id":"067","category":"classic","time_slot":"MORNING","author":"Francis Bacon","author_ko":"베이컨","era":"1561-1626","quote_en":"Knowledge is power.","quote_ko":"아는 것이 힘이다.","copyright":"public_domain","source":"Meditations","motivation_level":"calm"},{"id":"068","category":"classic","time_slot":"NIGHT","author":"Blaise Pascal","author_ko":"파스칼","era":"1623-1662","quote_en":"All of humanity's problems stem from man's inability to sit quietly in a room alone.","quote_ko":"인류의 모든 문제는 홀로 조용히 방에 앉아 있지 못함에서 비롯된다.","copyright":"public_domain","source":"Pensées","motivation_level":"calm"},{"id":"069","category":"classic","time_slot":"EVENING","author":"René Descartes","author_ko":"데카르트","era":"1596-1650","quote_en":"I think, therefore I am.","quote_ko":"나는 생각한다, 고로 존재한다.","copyright":"public_domain","source":"Discourse on Method","motivation_level":"calm"},{"id":"070","category":"classic","time_slot":"EVENING","author":"Baruch Spinoza","author_ko":"스피노자","era":"1632-1677","quote_en":"The highest activity a human being can attain is learning for understanding.","quote_ko":"인간이 도달할 수 있는 가장 높은 활동은 이해를 위한 배움이다.","copyright":"public_domain","source":"Ethics","motivation_level":"calm"},{"id":"071","category":"classic","time_slot":"DAWN","author":"G.W.F. Hegel","author_ko":"헤겔","era":"1770-1831","quote_en":"Nothing great in the world has ever been accomplished without passion.","quote_ko":"세상에 위대한 일은 열정 없이 이루어진 적이 없다.","copyright":"public_domain","source":"Philosophy of History","motivation_level":"calm"},{"id":"072","category":"classic","time_slot":"AFTERNOON","author":"Thomas Hardy","author_ko":"토머스 하디","era":"1840-1928","quote_en":"If a path to the better there be, it begins with a full look at the worst.","quote_ko":"더 나은 길이 있다면, 그 길은 최악을 제대로 직시하는 데서 시작된다.","copyright":"public_domain","source":"Poems","motivation_level":"calm"},{"id":"073","category":"classic","time_slot":"NIGHT","author":"George Eliot","author_ko":"조지 엘리엇","era":"1819-1880","quote_en":"It is never too late to be what you might have been.","quote_ko":"될 수 있었던 자신이 되기에 너무 늦은 때란 없다.","copyright":"public_domain","source":"Letters","motivation_level":"calm"},{"id":"074","category":"classic","time_slot":"MORNING","author":"Henrik Ibsen","author_ko":"입센","era":"1828-1906","quote_en":"A thousand words will not leave so deep an impression as one deed.","quote_ko":"천 마디 말도 단 하나의 행동만큼 깊은 인상을 남기지 못한다.","copyright":"public_domain","source":"Plays","motivation_level":"calm"},{"id":"075","category":"classic","time_slot":"EVENING","author":"Oliver Wendell Holmes","author_ko":"홈스","era":"1809-1894","quote_en":"A mind that is stretched by a new experience can never go back to its old dimensions.","quote_ko":"새로운 경험으로 늘어난 마음은 결코 이전 크기로 돌아가지 않는다.","copyright":"public_domain","source":"Essays","motivation_level":"calm"},{"id":"076","category":"designer","time_slot":"NOON","author":"Dieter Rams","author_ko":"디터 람스","era":"1932-","quote_en":"Good design is as little design as possible.","quote_ko":"좋은 디자인은 가능한 한 적은 디자인이다.","copyright":"attributed","source":"10 Principles","motivation_level":"medium"},{"id":"077","category":"designer","time_slot":"NOON","author":"Dieter Rams","author_ko":"디터 람스","era":"1932-","quote_en":"Less, but better.","quote_ko":"적게, 그러나 더 좋게.","copyright":"attributed","source":"Weniger, aber besser","motivation_level":"calm"},{"id":"078","category":"designer","time_slot":"NOON","author":"Dieter Rams","author_ko":"디터 람스","era":"1932-","quote_en":"Good design makes a product understandable.","quote_ko":"좋은 디자인은 제품을 이해 가능하게 만든다.","copyright":"attributed","source":"10 Principles","motivation_level":"medium"},{"id":"079","category":"designer","time_slot":"NOON","author":"Dieter Rams","author_ko":"디터 람스","era":"1932-","quote_en":"Good design is honest.","quote_ko":"좋은 디자인은 정직하다.","copyright":"attributed","source":"10 Principles","motivation_level":"medium"},{"id":"080","category":"designer","time_slot":"EVENING","author":"Dieter Rams","author_ko":"디터 람스","era":"1932-","quote_en":"Indifference towards people and the reality in which they live is the one and only cardinal sin in design.","quote_ko":"사람과 그들이 사는 현실에 대한 무관심이야말로 디자인의 유일한 죄악이다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"081","category":"designer","time_slot":"AFTERNOON","author":"Paul Rand","author_ko":"폴 랜드","era":"1914-1996","quote_en":"Design is the silent ambassador of your brand.","quote_ko":"디자인은 브랜드의 말 없는 대사다.","copyright":"attributed","source":"Essays","motivation_level":"medium"},{"id":"082","category":"designer","time_slot":"MORNING","author":"Paul Rand","author_ko":"폴 랜드","era":"1914-1996","quote_en":"Don't try to be original. Just try to be good.","quote_ko":"독창적이려 하지 마라. 그저 훌륭해지려 하라.","copyright":"attributed","source":"Thoughts on Design","motivation_level":"medium"},{"id":"083","category":"designer","time_slot":"NOON","author":"Paul Rand","author_ko":"폴 랜드","era":"1914-1996","quote_en":"Simplicity is not the goal. It is the by-product of a good idea and modest expectations.","quote_ko":"단순함은 목표가 아니다. 좋은 아이디어와 겸손한 기대의 부산물이다.","copyright":"attributed","source":"A Designer's Art","motivation_level":"calm"},{"id":"084","category":"designer","time_slot":"NOON","author":"Charles Eames","author_ko":"찰스 임스","era":"1907-1978","quote_en":"The details are not the details. They make the design.","quote_ko":"디테일은 사소하지 않다. 그것이 디자인 자체다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"085","category":"designer","time_slot":"NOON","author":"Charles Eames","author_ko":"찰스 임스","era":"1907-1978","quote_en":"Recognizing the need is the primary condition for design.","quote_ko":"필요를 인식하는 것이 디자인의 첫 번째 조건이다.","copyright":"attributed","source":"Design Q&A","motivation_level":"medium"},{"id":"086","category":"designer","time_slot":"AFTERNOON","author":"Ray Eames","author_ko":"레이 임스","era":"1912-1988","quote_en":"What works good is better than what looks good, because what works good lasts.","quote_ko":"좋아 보이는 것보다 잘 작동하는 것이 낫다. 잘 작동하는 것은 오래가기 때문이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"087","category":"designer","time_slot":"NOON","author":"Steve Jobs","author_ko":"스티브 잡스","era":"1955-2011","quote_en":"Design is not just what it looks like and feels like. Design is how it works.","quote_ko":"디자인은 단지 보이고 느껴지는 것이 아니다. 디자인은 어떻게 작동하는가이다.","copyright":"attributed","source":"NYT Interview 2003","motivation_level":"medium"},{"id":"088","category":"designer","time_slot":"NOON","author":"Steve Jobs","author_ko":"스티브 잡스","era":"1955-2011","quote_en":"Simplicity is the ultimate sophistication.","quote_ko":"단순함은 궁극의 정교함이다.","copyright":"attributed","source":"Apple Brochure 1977","motivation_level":"calm"},{"id":"089","category":"designer","time_slot":"MORNING","author":"Steve Jobs","author_ko":"스티브 잡스","era":"1955-2011","quote_en":"Details matter, it's worth waiting to get it right.","quote_ko":"디테일이 중요하다. 제대로 하기 위해 기다릴 가치가 있다.","copyright":"attributed","source":"Apple meetings","motivation_level":"medium"},{"id":"090","category":"designer","time_slot":"NOON","author":"Jony Ive","author_ko":"조니 아이브","era":"1967-","quote_en":"Simplicity is not the absence of clutter; that's a consequence of simplicity.","quote_ko":"단순함은 혼잡의 부재가 아니다. 그것은 단순함의 결과일 뿐이다.","copyright":"attributed","source":"Objectified documentary","motivation_level":"calm"},{"id":"091","category":"designer","time_slot":"NIGHT","author":"Jony Ive","author_ko":"조니 아이브","era":"1967-","quote_en":"The most important thing for a designer is to really understand what people want.","quote_ko":"디자이너에게 가장 중요한 것은 사람들이 진정 원하는 것을 이해하는 것이다.","copyright":"attributed","source":"Interview","motivation_level":"calm"},{"id":"092","category":"designer","time_slot":"AFTERNOON","author":"Massimo Vignelli","author_ko":"마시모 비넬리","era":"1931-2014","quote_en":"The life of a designer is a life of fight. Fight against the ugliness.","quote_ko":"디자이너의 삶은 싸움이다. 추함과의 싸움이다.","copyright":"attributed","source":"The Vignelli Canon","motivation_level":"hard"},{"id":"093","category":"designer","time_slot":"NOON","author":"Massimo Vignelli","author_ko":"마시모 비넬리","era":"1931-2014","quote_en":"Styles come and go. Good design is a language, not a style.","quote_ko":"스타일은 오고 간다. 좋은 디자인은 언어이지 스타일이 아니다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"094","category":"designer","time_slot":"DAWN","author":"Milton Glaser","author_ko":"밀턴 글레이저","era":"1929-2020","quote_en":"There are three responses to a piece of design – yes, no, and WOW! Wow is the one to aim for.","quote_ko":"디자인에 대한 반응은 세 가지다. 예, 아니오, 와우! 와우가 바로 목표다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"095","category":"designer","time_slot":"NOON","author":"Milton Glaser","author_ko":"밀턴 글레이저","era":"1929-2020","quote_en":"Art is work. I've never worked a day in my life – I've played every day.","quote_ko":"예술은 일이다. 나는 평생 일한 적이 없다—매일 놀았다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"096","category":"designer","time_slot":"NOON","author":"Saul Bass","author_ko":"솔 바스","era":"1920-1996","quote_en":"Design is thinking made visual.","quote_ko":"디자인은 생각을 시각화한 것이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"097","category":"designer","time_slot":"NOON","author":"Saul Bass","author_ko":"솔 바스","era":"1920-1996","quote_en":"I want to make beautiful things, even if nobody cares.","quote_ko":"아무도 신경 쓰지 않아도 나는 아름다운 것을 만들고 싶다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"098","category":"designer","time_slot":"NOON","author":"Ludwig Mies van der Rohe","author_ko":"미스 반 데어 로에","era":"1886-1969","quote_en":"Less is more.","quote_ko":"적을수록 많다.","copyright":"attributed","source":"Maxim","motivation_level":"calm"},{"id":"099","category":"designer","time_slot":"NOON","author":"Ludwig Mies van der Rohe","author_ko":"미스 반 데어 로에","era":"1886-1969","quote_en":"God is in the details.","quote_ko":"신은 디테일에 있다.","copyright":"attributed","source":"Maxim","motivation_level":"medium"},{"id":"100","category":"designer","time_slot":"EVENING","author":"Le Corbusier","author_ko":"르 코르뷔지에","era":"1887-1965","quote_en":"Space and light and order. Those are the things that men need just as much as they need bread or a place to sleep.","quote_ko":"공간과 빛과 질서. 이는 인간이 빵이나 잠자리만큼 필요로 하는 것이다.","copyright":"attributed","source":"Essays","motivation_level":"medium"},{"id":"101","category":"designer","time_slot":"EVENING","author":"Le Corbusier","author_ko":"르 코르뷔지에","era":"1887-1965","quote_en":"The home should be the treasure chest of living.","quote_ko":"집은 삶의 보물 상자여야 한다.","copyright":"attributed","source":"Towards a New Architecture","motivation_level":"medium"},{"id":"102","category":"designer","time_slot":"NIGHT","author":"Frank Lloyd Wright","author_ko":"프랭크 로이드 라이트","era":"1867-1959","quote_en":"The longer I live, the more beautiful life becomes.","quote_ko":"오래 살수록 삶은 더 아름다워진다.","copyright":"public_domain","source":"Autobiography","motivation_level":"calm"},{"id":"103","category":"designer","time_slot":"NOON","author":"Frank Lloyd Wright","author_ko":"프랭크 로이드 라이트","era":"1867-1959","quote_en":"Form follows function – that has been misunderstood. Form and function should be one, joined in a spiritual union.","quote_ko":"형태는 기능을 따른다—이는 오해되어 왔다. 형태와 기능은 영적 결합 속에 하나여야 한다.","copyright":"public_domain","source":"Essays","motivation_level":"medium"},{"id":"104","category":"designer","time_slot":"NOON","author":"Louis Sullivan","author_ko":"루이스 설리번","era":"1856-1924","quote_en":"Form ever follows function.","quote_ko":"형태는 언제나 기능을 따른다.","copyright":"public_domain","source":"The Tall Office Building Artistically Considered","motivation_level":"medium"},{"id":"105","category":"designer","time_slot":"NOON","author":"Walter Gropius","author_ko":"발터 그로피우스","era":"1883-1969","quote_en":"The objective of all creative effort in the visual arts is to give form to space.","quote_ko":"시각예술의 모든 창조적 노력의 목표는 공간에 형태를 부여하는 것이다.","copyright":"attributed","source":"Bauhaus Manifesto","motivation_level":"medium"},{"id":"106","category":"designer","time_slot":"NOON","author":"Bruno Munari","author_ko":"브루노 무나리","era":"1907-1998","quote_en":"Complicating is easy, simplifying is difficult.","quote_ko":"복잡하게 하는 것은 쉽고, 단순하게 하는 것은 어렵다.","copyright":"attributed","source":"Design as Art","motivation_level":"medium"},{"id":"107","category":"designer","time_slot":"MORNING","author":"Massimo Vignelli","author_ko":"마시모 비넬리","era":"1931-2014","quote_en":"If you can design one thing, you can design everything.","quote_ko":"하나를 디자인할 수 있다면 모든 것을 디자인할 수 있다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"108","category":"designer","time_slot":"AFTERNOON","author":"David Carson","author_ko":"데이비드 카슨","era":"1955-","quote_en":"Don't mistake legibility for communication.","quote_ko":"가독성을 커뮤니케이션과 혼동하지 마라.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"109","category":"designer","time_slot":"MORNING","author":"Michael Bierut","author_ko":"마이클 비에루트","era":"1957-","quote_en":"All design is redesign.","quote_ko":"모든 디자인은 재디자인이다.","copyright":"attributed","source":"79 Short Essays","motivation_level":"medium"},{"id":"110","category":"designer","time_slot":"NIGHT","author":"Stefan Sagmeister","author_ko":"슈테판 자그마이스터","era":"1962-","quote_en":"Design that is honest about what it is.","quote_ko":"자신이 무엇인지에 대해 정직한 디자인.","copyright":"attributed","source":"Sagmeister: Made You Look","motivation_level":"calm"},{"id":"111","category":"designer","time_slot":"EVENING","author":"Paula Scher","author_ko":"폴라 셰어","era":"1948-","quote_en":"It's through mistakes that you actually can grow.","quote_ko":"실수를 통해서만 실제로 성장할 수 있다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"112","category":"designer","time_slot":"AFTERNOON","author":"Paula Scher","author_ko":"폴라 셰어","era":"1948-","quote_en":"The most interesting designers are the ones who are experimenting.","quote_ko":"가장 흥미로운 디자이너는 실험하는 사람들이다.","copyright":"attributed","source":"Interview","motivation_level":"calm"},{"id":"113","category":"designer","time_slot":"AFTERNOON","author":"Jessica Walsh","author_ko":"제시카 월시","era":"1986-","quote_en":"Design is not about making things pretty. It is about solving problems.","quote_ko":"디자인은 예쁘게 만드는 것이 아니다. 문제를 해결하는 것이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"114","category":"designer","time_slot":"MORNING","author":"Ivan Chermayeff","author_ko":"이반 체르마예프","era":"1932-2017","quote_en":"Design isn't finished until somebody is using it.","quote_ko":"디자인은 누군가 사용하기 전까지는 완성되지 않는다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"115","category":"designer","time_slot":"AFTERNOON","author":"Tom Peters","author_ko":"톰 피터스","era":"1942-","quote_en":"Design is everything.","quote_ko":"디자인이 모든 것이다.","copyright":"attributed","source":"Re-imagine!","motivation_level":"medium"},{"id":"116","category":"designer","time_slot":"NOON","author":"Coco Chanel","author_ko":"코코 샤넬","era":"1883-1971","quote_en":"Simplicity is the keynote of all true elegance.","quote_ko":"단순함이 모든 진정한 우아함의 핵심이다.","copyright":"attributed","source":"Interview","motivation_level":"calm"},{"id":"117","category":"designer","time_slot":"NOON","author":"Coco Chanel","author_ko":"코코 샤넬","era":"1883-1971","quote_en":"Fashion fades, only style remains the same.","quote_ko":"유행은 사라지고, 스타일만이 남는다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"118","category":"designer","time_slot":"NOON","author":"Yves Saint Laurent","author_ko":"이브 생 로랑","era":"1936-2008","quote_en":"Fashions fade, style is eternal.","quote_ko":"유행은 사라지지만 스타일은 영원하다.","copyright":"attributed","source":"Interview","motivation_level":"calm"},{"id":"119","category":"designer","time_slot":"NOON","author":"Karl Lagerfeld","author_ko":"칼 라거펠트","era":"1933-2019","quote_en":"One is never over-dressed or under-dressed with a little black dress.","quote_ko":"작은 검은 드레스를 입으면 결코 과하지도 부족하지도 않다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"120","category":"designer","time_slot":"NOON","author":"Issey Miyake","author_ko":"이세이 미야케","era":"1938-2022","quote_en":"Design is not for philosophy, it's for life.","quote_ko":"디자인은 철학을 위한 것이 아니라 삶을 위한 것이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"121","category":"designer","time_slot":"NIGHT","author":"Tadao Ando","author_ko":"안도 다다오","era":"1941-","quote_en":"I don't believe architecture has to speak too much. It should remain silent.","quote_ko":"건축이 너무 많은 말을 해야 한다고 생각하지 않는다. 침묵해야 한다.","copyright":"attributed","source":"Interview","motivation_level":"calm"},{"id":"122","category":"designer","time_slot":"EVENING","author":"Tadao Ando","author_ko":"안도 다다오","era":"1941-","quote_en":"Light gives existence to form and life to architecture.","quote_ko":"빛은 형태에 존재를, 건축에 생명을 부여한다.","copyright":"attributed","source":"Essays","motivation_level":"medium"},{"id":"123","category":"designer","time_slot":"NOON","author":"Kenya Hara","author_ko":"하라 켄야","era":"1958-","quote_en":"Emptiness is a medium for imagination.","quote_ko":"비어 있음은 상상의 매체다.","copyright":"attributed","source":"White","motivation_level":"calm"},{"id":"124","category":"designer","time_slot":"EVENING","author":"Kenya Hara","author_ko":"하라 켄야","era":"1958-","quote_en":"Design is not a special activity for the talented few. It is for everyone.","quote_ko":"디자인은 소수 재능 있는 이들의 특별한 활동이 아니다. 모두를 위한 것이다.","copyright":"attributed","source":"Designing Design","motivation_level":"medium"},{"id":"125","category":"designer","time_slot":"NOON","author":"Naoto Fukasawa","author_ko":"후카사와 나오토","era":"1956-","quote_en":"Design dissolves in behavior.","quote_ko":"디자인은 행동 속에 녹아든다.","copyright":"attributed","source":"Super Normal","motivation_level":"medium"},{"id":"126","category":"designer","time_slot":"NOON","author":"Jasper Morrison","author_ko":"재스퍼 모리슨","era":"1959-","quote_en":"A really good design is a super normal design.","quote_ko":"정말 좋은 디자인은 지극히 평범한 디자인이다.","copyright":"attributed","source":"Super Normal","motivation_level":"medium"},{"id":"127","category":"designer","time_slot":"NOON","author":"Philippe Starck","author_ko":"필립 스탁","era":"1949-","quote_en":"The best design is the one you don't see.","quote_ko":"최고의 디자인은 보이지 않는 디자인이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"128","category":"designer","time_slot":"NIGHT","author":"Marc Newson","author_ko":"마크 뉴슨","era":"1963-","quote_en":"Design is an unknown quantity, a mystery.","quote_ko":"디자인은 미지의 양, 하나의 신비다.","copyright":"attributed","source":"Interview","motivation_level":"calm"},{"id":"129","category":"designer","time_slot":"DAWN","author":"Zaha Hadid","author_ko":"자하 하디드","era":"1950-2016","quote_en":"I really believe in the idea of the future.","quote_ko":"나는 미래라는 개념을 정말 믿는다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"130","category":"designer","time_slot":"DAWN","author":"Zaha Hadid","author_ko":"자하 하디드","era":"1950-2016","quote_en":"There are 360 degrees, so why stick to one?","quote_ko":"360도가 있는데 왜 하나에만 매달리는가?","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"131","category":"designer","time_slot":"AFTERNOON","author":"Rem Koolhaas","author_ko":"렘 콜하스","era":"1944-","quote_en":"Architecture is a hazardous mixture of omnipotence and impotence.","quote_ko":"건축은 전능함과 무력함의 위험한 혼합물이다.","copyright":"attributed","source":"S,M,L,XL","motivation_level":"medium"},{"id":"132","category":"designer","time_slot":"EVENING","author":"Peter Zumthor","author_ko":"페터 춤토르","era":"1943-","quote_en":"Quality architecture to me is when a building manages to move me.","quote_ko":"내게 질 높은 건축은 건물이 나를 감동시키는 것이다.","copyright":"attributed","source":"Thinking Architecture","motivation_level":"medium"},{"id":"133","category":"designer","time_slot":"EVENING","author":"Antoni Gaudí","author_ko":"가우디","era":"1852-1926","quote_en":"Nothing is invented, for it's written in nature first.","quote_ko":"새로 발명되는 것은 없다. 자연에 이미 쓰여 있기 때문이다.","copyright":"public_domain","source":"Notebooks","motivation_level":"calm"},{"id":"134","category":"designer","time_slot":"EVENING","author":"Alvar Aalto","author_ko":"알바 알토","era":"1898-1976","quote_en":"Form must have a content, and that content must be linked with nature.","quote_ko":"형태에는 내용이 있어야 하며, 그 내용은 자연과 연결되어야 한다.","copyright":"attributed","source":"Essays","motivation_level":"medium"},{"id":"135","category":"designer","time_slot":"NOON","author":"Charles Mackintosh","author_ko":"찰스 매킨토시","era":"1868-1928","quote_en":"Art is the flower. Life is the green leaf.","quote_ko":"예술은 꽃이고, 삶은 초록 잎이다.","copyright":"public_domain","source":"Seemliness lecture","motivation_level":"medium"},{"id":"136","category":"designer","time_slot":"AFTERNOON","author":"Raymond Loewy","author_ko":"레이먼드 로위","era":"1893-1986","quote_en":"Most Advanced Yet Acceptable.","quote_ko":"가장 앞선, 그러나 받아들여질 수 있는.","copyright":"attributed","source":"MAYA principle","motivation_level":"calm"},{"id":"137","category":"designer","time_slot":"EVENING","author":"Henry Dreyfuss","author_ko":"헨리 드라이퍼스","era":"1904-1972","quote_en":"What we are working on is going to be ridden in, sat upon, looked at, talked into, activated, operated, or in some way used by people.","quote_ko":"우리가 만드는 것은 사람들이 타거나, 앉거나, 보거나, 말하거나, 작동시키거나, 사용하는 대상이다.","copyright":"attributed","source":"Designing for People","motivation_level":"medium"},{"id":"138","category":"designer","time_slot":"EVENING","author":"Donald Norman","author_ko":"도널드 노먼","era":"1935-","quote_en":"Design is really an act of communication.","quote_ko":"디자인은 본질적으로 커뮤니케이션의 행위다.","copyright":"attributed","source":"The Design of Everyday Things","motivation_level":"medium"},{"id":"139","category":"designer","time_slot":"NOON","author":"Donald Norman","author_ko":"도널드 노먼","era":"1935-","quote_en":"Attractive things work better.","quote_ko":"매력적인 것은 더 잘 작동한다.","copyright":"attributed","source":"Emotional Design","motivation_level":"medium"},{"id":"140","category":"designer","time_slot":"NOON","author":"Don Draper","author_ko":"돈 드레이퍼(가상)","era":"Fictional","quote_en":"Make it simple, but significant.","quote_ko":"단순하게, 그러나 의미 있게 만들어라.","copyright":"fair_use","source":"Mad Men","motivation_level":"medium"},{"id":"141","category":"designer","time_slot":"AFTERNOON","author":"Bill Bernbach","author_ko":"빌 번바흐","era":"1911-1982","quote_en":"In advertising, not to be different is virtually suicidal.","quote_ko":"광고에서 다르지 않은 것은 거의 자살이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"142","category":"designer","time_slot":"AFTERNOON","author":"David Ogilvy","author_ko":"데이비드 오길비","era":"1911-1999","quote_en":"The consumer isn't a moron; she is your wife.","quote_ko":"소비자는 바보가 아니다. 그녀는 당신의 아내다.","copyright":"attributed","source":"Confessions of an Advertising Man","motivation_level":"medium"},{"id":"143","category":"designer","time_slot":"AFTERNOON","author":"David Ogilvy","author_ko":"데이비드 오길비","era":"1911-1999","quote_en":"If it doesn't sell, it isn't creative.","quote_ko":"팔리지 않으면 창의적인 것이 아니다.","copyright":"attributed","source":"Ogilvy on Advertising","motivation_level":"medium"},{"id":"144","category":"designer","time_slot":"DAWN","author":"Leo Burnett","author_ko":"레오 버넷","era":"1891-1971","quote_en":"When you reach for the stars you may not quite get one, but you won't come up with a handful of mud either.","quote_ko":"별을 향해 손을 뻗으면 별을 잡지 못할 수는 있지만, 진흙 한 줌이 잡히지도 않을 것이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"145","category":"designer","time_slot":"EVENING","author":"Irma Boom","author_ko":"이르마 붐","era":"1960-","quote_en":"You should never design for yourself.","quote_ko":"자신을 위해 디자인해선 안 된다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"146","category":"designer","time_slot":"EVENING","author":"Chip Kidd","author_ko":"칩 키드","era":"1964-","quote_en":"Great design is a multi-layered relationship between human life and its environment.","quote_ko":"위대한 디자인은 인간의 삶과 환경 사이의 다층적 관계다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"147","category":"designer","time_slot":"MORNING","author":"Jessica Hische","author_ko":"제시카 히셔","era":"1984-","quote_en":"The work you do while you procrastinate is probably the work you should be doing for the rest of your life.","quote_ko":"미루며 하는 일이 아마 평생 해야 할 일일 것이다.","copyright":"attributed","source":"Interview","motivation_level":"calm"},{"id":"148","category":"designer","time_slot":"NOON","author":"Rob Giampietro","author_ko":"롭 지암피에트로","era":"1975-","quote_en":"Design is a plan for arranging elements in such a way as best to accomplish a particular purpose.","quote_ko":"디자인은 특정 목적을 최선으로 달성하기 위해 요소를 배열하는 계획이다.","copyright":"attributed","source":"Essays","motivation_level":"medium"},{"id":"149","category":"designer","time_slot":"MORNING","author":"Aaron Draplin","author_ko":"아론 드라플린","era":"1973-","quote_en":"Don't just get it done. Get it done right.","quote_ko":"그저 끝내지 마라. 제대로 끝내라.","copyright":"attributed","source":"Pretty Much Everything","motivation_level":"medium"},{"id":"150","category":"designer","time_slot":"DAWN","author":"Eileen Gray","author_ko":"아일린 그레이","era":"1878-1976","quote_en":"To create, one must first question everything.","quote_ko":"창조하려면 먼저 모든 것에 의문을 던져야 한다.","copyright":"attributed","source":"Essays","motivation_level":"medium"},{"id":"151","category":"founder","time_slot":"DAWN","author":"Steve Jobs","author_ko":"스티브 잡스","era":"1955-2011","quote_en":"Stay hungry, stay foolish.","quote_ko":"갈망하라, 우직하라.","copyright":"attributed","source":"Stanford 2005","motivation_level":"medium"},{"id":"152","category":"founder","time_slot":"AFTERNOON","author":"Steve Jobs","author_ko":"스티브 잡스","era":"1955-2011","quote_en":"Innovation distinguishes between a leader and a follower.","quote_ko":"혁신이 리더와 추종자를 가른다.","copyright":"attributed","source":"Apple keynote","motivation_level":"medium"},{"id":"153","category":"founder","time_slot":"MORNING","author":"Steve Jobs","author_ko":"스티브 잡스","era":"1955-2011","quote_en":"The only way to do great work is to love what you do.","quote_ko":"위대한 일을 하는 유일한 방법은 사랑하는 일을 하는 것이다.","copyright":"attributed","source":"Stanford 2005","motivation_level":"medium"},{"id":"154","category":"founder","time_slot":"MORNING","author":"Steve Jobs","author_ko":"스티브 잡스","era":"1955-2011","quote_en":"Your time is limited, so don't waste it living someone else's life.","quote_ko":"시간은 유한하다. 다른 이의 삶을 사는 데 낭비하지 마라.","copyright":"attributed","source":"Stanford 2005","motivation_level":"medium"},{"id":"155","category":"founder","time_slot":"MORNING","author":"Steve Jobs","author_ko":"스티브 잡스","era":"1955-2011","quote_en":"Focus is about saying no.","quote_ko":"집중이란 '아니오'라고 말하는 것이다.","copyright":"attributed","source":"WWDC 1997","motivation_level":"medium"},{"id":"156","category":"founder","time_slot":"DAWN","author":"Elon Musk","author_ko":"일론 머스크","era":"1971-","quote_en":"When something is important enough, you do it even if the odds are not in your favor.","quote_ko":"충분히 중요한 일이라면, 성공 확률이 낮아도 하는 것이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"157","category":"founder","time_slot":"DAWN","author":"Elon Musk","author_ko":"일론 머스크","era":"1971-","quote_en":"The first step is to establish that something is possible; then probability will occur.","quote_ko":"첫걸음은 가능하다는 것을 확립하는 것이다. 그러면 확률이 생긴다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"158","category":"founder","time_slot":"MORNING","author":"Elon Musk","author_ko":"일론 머스크","era":"1971-","quote_en":"Failure is an option here. If things are not failing, you are not innovating enough.","quote_ko":"실패는 선택지다. 실패하지 않는다면 충분히 혁신하지 않는 것이다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"159","category":"founder","time_slot":"AFTERNOON","author":"Jeff Bezos","author_ko":"제프 베조스","era":"1964-","quote_en":"Your margin is my opportunity.","quote_ko":"너의 마진은 나의 기회다.","copyright":"attributed","source":"Shareholder letter","motivation_level":"medium"},{"id":"160","category":"founder","time_slot":"AFTERNOON","author":"Jeff Bezos","author_ko":"제프 베조스","era":"1964-","quote_en":"If you double the number of experiments you do per year, you're going to double your inventiveness.","quote_ko":"연간 실험 횟수를 두 배로 늘리면 창의성도 두 배가 된다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"161","category":"founder","time_slot":"AFTERNOON","author":"Jeff Bezos","author_ko":"제프 베조스","era":"1964-","quote_en":"A brand for a company is like a reputation for a person.","quote_ko":"기업의 브랜드는 사람의 평판과 같다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"162","category":"founder","time_slot":"DAWN","author":"Bill Gates","author_ko":"빌 게이츠","era":"1955-","quote_en":"Most people overestimate what they can do in one year and underestimate what they can do in ten years.","quote_ko":"대부분은 1년에 할 수 있는 것을 과대평가하고 10년에 할 수 있는 것을 과소평가한다.","copyright":"attributed","source":"Interview","motivation_level":"calm"},{"id":"163","category":"founder","time_slot":"EVENING","author":"Bill Gates","author_ko":"빌 게이츠","era":"1955-","quote_en":"Your most unhappy customers are your greatest source of learning.","quote_ko":"가장 불만족한 고객이 가장 큰 배움의 원천이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"164","category":"founder","time_slot":"AFTERNOON","author":"Warren Buffett","author_ko":"워런 버핏","era":"1930-","quote_en":"Price is what you pay. Value is what you get.","quote_ko":"가격은 당신이 지불하는 것이고, 가치는 당신이 얻는 것이다.","copyright":"attributed","source":"Berkshire Letter","motivation_level":"medium"},{"id":"165","category":"founder","time_slot":"AFTERNOON","author":"Warren Buffett","author_ko":"워런 버핏","era":"1930-","quote_en":"It takes 20 years to build a reputation and five minutes to ruin it.","quote_ko":"평판을 쌓는 데 20년 걸리지만 무너뜨리는 데는 5분이면 된다.","copyright":"attributed","source":"Berkshire Letter","motivation_level":"medium"},{"id":"166","category":"founder","time_slot":"EVENING","author":"Warren Buffett","author_ko":"워런 버핏","era":"1930-","quote_en":"Someone is sitting in the shade today because someone planted a tree a long time ago.","quote_ko":"오늘 누군가 그늘에 앉아 있는 것은 오래 전 누군가가 나무를 심었기 때문이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"167","category":"founder","time_slot":"AFTERNOON","author":"Charlie Munger","author_ko":"찰리 멍거","era":"1924-2023","quote_en":"Invert, always invert.","quote_ko":"거꾸로 생각하라, 항상 거꾸로.","copyright":"attributed","source":"Poor Charlie's Almanack","motivation_level":"medium"},{"id":"168","category":"founder","time_slot":"AFTERNOON","author":"Charlie Munger","author_ko":"찰리 멍거","era":"1924-2023","quote_en":"The big money is not in the buying and selling, but in the waiting.","quote_ko":"큰돈은 사고파는 데 있지 않고 기다리는 데 있다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"169","category":"founder","time_slot":"DAWN","author":"Mark Zuckerberg","author_ko":"마크 저커버그","era":"1984-","quote_en":"The biggest risk is not taking any risk.","quote_ko":"가장 큰 위험은 아무 위험도 감수하지 않는 것이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"170","category":"founder","time_slot":"MORNING","author":"Mark Zuckerberg","author_ko":"마크 저커버그","era":"1984-","quote_en":"Done is better than perfect.","quote_ko":"완벽보다 완료가 낫다.","copyright":"attributed","source":"Facebook office wall","motivation_level":"medium"},{"id":"171","category":"founder","time_slot":"MORNING","author":"Larry Page","author_ko":"래리 페이지","era":"1973-","quote_en":"Always deliver more than expected.","quote_ko":"항상 기대 이상을 전달하라.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"172","category":"founder","time_slot":"AFTERNOON","author":"Sergey Brin","author_ko":"세르게이 브린","era":"1973-","quote_en":"Solving big problems is easier than solving little problems.","quote_ko":"큰 문제를 푸는 것이 작은 문제를 푸는 것보다 쉽다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"173","category":"founder","time_slot":"EVENING","author":"Sundar Pichai","author_ko":"순다르 피차이","era":"1972-","quote_en":"Wear your failure as a badge of honor.","quote_ko":"실패를 명예의 훈장처럼 달고 다녀라.","copyright":"attributed","source":"Commencement speech","motivation_level":"hard"},{"id":"174","category":"founder","time_slot":"AFTERNOON","author":"Satya Nadella","author_ko":"사티아 나델라","era":"1967-","quote_en":"Our industry does not respect tradition. It only respects innovation.","quote_ko":"우리 산업은 전통을 존중하지 않는다. 혁신만을 존중한다.","copyright":"attributed","source":"Microsoft memo","motivation_level":"medium"},{"id":"175","category":"founder","time_slot":"DAWN","author":"Reid Hoffman","author_ko":"리드 호프먼","era":"1967-","quote_en":"If you're not embarrassed by the first version of your product, you've launched too late.","quote_ko":"제품의 첫 버전이 부끄럽지 않다면 너무 늦게 출시한 것이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"176","category":"founder","time_slot":"AFTERNOON","author":"Peter Thiel","author_ko":"피터 틸","era":"1967-","quote_en":"Competition is for losers.","quote_ko":"경쟁은 패자들의 것이다.","copyright":"attributed","source":"Zero to One","motivation_level":"medium"},{"id":"177","category":"founder","time_slot":"EVENING","author":"Peter Thiel","author_ko":"피터 틸","era":"1967-","quote_en":"The most contrarian thing of all is not to oppose the crowd but to think for yourself.","quote_ko":"가장 반골적인 것은 군중에 맞서는 것이 아니라 스스로 생각하는 것이다.","copyright":"attributed","source":"Zero to One","motivation_level":"medium"},{"id":"178","category":"founder","time_slot":"AFTERNOON","author":"Paul Graham","author_ko":"폴 그레이엄","era":"1964-","quote_en":"Make something people want.","quote_ko":"사람들이 원하는 것을 만들어라.","copyright":"attributed","source":"Y Combinator motto","motivation_level":"medium"},{"id":"179","category":"founder","time_slot":"MORNING","author":"Paul Graham","author_ko":"폴 그레이엄","era":"1964-","quote_en":"The way to get startup ideas is not to try to think of startup ideas.","quote_ko":"스타트업 아이디어를 얻는 방법은 스타트업 아이디어를 생각하지 않는 것이다.","copyright":"attributed","source":"Essays","motivation_level":"medium"},{"id":"180","category":"founder","time_slot":"AFTERNOON","author":"Sam Altman","author_ko":"샘 알트먼","era":"1985-","quote_en":"The best companies start as a feature.","quote_ko":"최고의 기업은 하나의 기능에서 시작한다.","copyright":"attributed","source":"Startup Playbook","motivation_level":"medium"},{"id":"181","category":"founder","time_slot":"AFTERNOON","author":"Marc Andreessen","author_ko":"마크 앤드리슨","era":"1971-","quote_en":"Software is eating the world.","quote_ko":"소프트웨어가 세상을 삼킨다.","copyright":"attributed","source":"WSJ essay 2011","motivation_level":"hard"},{"id":"182","category":"founder","time_slot":"EVENING","author":"Ben Horowitz","author_ko":"벤 호로위츠","era":"1966-","quote_en":"The hard thing isn't setting a big, hairy, audacious goal. The hard thing is laying people off.","quote_ko":"어려운 건 대담한 목표를 세우는 게 아니다. 사람을 해고하는 것이다.","copyright":"attributed","source":"The Hard Thing About Hard Things","motivation_level":"hard"},{"id":"183","category":"founder","time_slot":"DAWN","author":"Jack Welch","author_ko":"잭 웰치","era":"1935-2020","quote_en":"Change before you have to.","quote_ko":"바꿀 수밖에 없게 되기 전에 바꿔라.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"184","category":"founder","time_slot":"DAWN","author":"Peter Drucker","author_ko":"피터 드러커","era":"1909-2005","quote_en":"The best way to predict the future is to create it.","quote_ko":"미래를 예측하는 최선의 방법은 창조하는 것이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"185","category":"founder","time_slot":"EVENING","author":"Peter Drucker","author_ko":"피터 드러커","era":"1909-2005","quote_en":"Culture eats strategy for breakfast.","quote_ko":"문화는 아침식사로 전략을 먹어치운다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"186","category":"founder","time_slot":"EVENING","author":"Peter Drucker","author_ko":"피터 드러커","era":"1909-2005","quote_en":"The most important thing in communication is hearing what isn't said.","quote_ko":"소통에서 가장 중요한 것은 말하지 않은 것을 듣는 것이다.","copyright":"attributed","source":"Management","motivation_level":"medium"},{"id":"187","category":"founder","time_slot":"AFTERNOON","author":"Richard Branson","author_ko":"리처드 브랜슨","era":"1950-","quote_en":"Business opportunities are like buses, there's always another one coming.","quote_ko":"사업 기회는 버스와 같다. 또 다른 버스가 곧 온다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"188","category":"founder","time_slot":"DAWN","author":"Richard Branson","author_ko":"리처드 브랜슨","era":"1950-","quote_en":"If your dreams don't scare you, they are too small.","quote_ko":"꿈이 두렵지 않다면 너무 작은 꿈이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"189","category":"founder","time_slot":"NIGHT","author":"Tim Cook","author_ko":"팀 쿡","era":"1960-","quote_en":"Let your joy be in your journey—not in some distant goal.","quote_ko":"기쁨은 먼 목표가 아니라 여정 속에 있게 하라.","copyright":"attributed","source":"Commencement","motivation_level":"calm"},{"id":"190","category":"founder","time_slot":"EVENING","author":"Reed Hastings","author_ko":"리드 헤이스팅스","era":"1960-","quote_en":"Do not tolerate brilliant jerks. The cost to teamwork is too high.","quote_ko":"뛰어난 싸가지를 용납하지 마라. 팀워크에 드는 비용이 너무 크다.","copyright":"attributed","source":"Netflix culture deck","motivation_level":"medium"},{"id":"191","category":"founder","time_slot":"EVENING","author":"Brian Chesky","author_ko":"브라이언 체스키","era":"1981-","quote_en":"Build something 100 people love, not something 1 million people kind of like.","quote_ko":"100명이 사랑하는 것을 만들어라, 100만 명이 그럭저럭 좋아하는 것이 아니라.","copyright":"attributed","source":"Y Combinator talk","motivation_level":"medium"},{"id":"192","category":"founder","time_slot":"MORNING","author":"Travis Kalanick","author_ko":"트래비스 캘러닉","era":"1976-","quote_en":"Always be hustlin'.","quote_ko":"항상 뛰어라.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"193","category":"founder","time_slot":"AFTERNOON","author":"Jack Ma","author_ko":"마윈","era":"1964-","quote_en":"Never give up. Today is hard, tomorrow will be worse, but the day after tomorrow will be sunshine.","quote_ko":"포기하지 마라. 오늘은 힘들고 내일은 더 힘들 것이다. 그러나 모레는 햇빛이다.","copyright":"attributed","source":"Interview","motivation_level":"hard"},{"id":"194","category":"founder","time_slot":"AFTERNOON","author":"Lee Kun-hee","author_ko":"이건희","era":"1942-2020","quote_en":"Change everything except your wife and children.","quote_ko":"마누라와 자식 빼고 다 바꿔라.","copyright":"attributed","source":"Frankfurt Declaration 1993","motivation_level":"medium"},{"id":"195","category":"founder","time_slot":"MORNING","author":"Chung Ju-yung","author_ko":"정주영","era":"1915-2001","quote_en":"You tried? Really tried?","quote_ko":"이봐, 해봤어?","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"196","category":"founder","time_slot":"AFTERNOON","author":"Akio Morita","author_ko":"모리타 아키오","era":"1921-1999","quote_en":"The public does not know what is possible. We do.","quote_ko":"대중은 무엇이 가능한지 모른다. 우리는 안다.","copyright":"attributed","source":"Made in Japan","motivation_level":"medium"},{"id":"197","category":"founder","time_slot":"MORNING","author":"Kazuo Inamori","author_ko":"이나모리 가즈오","era":"1932-2022","quote_en":"Work as if your hair is on fire.","quote_ko":"머리에 불이 붙은 듯 일하라.","copyright":"attributed","source":"Kyocera Philosophy","motivation_level":"medium"},{"id":"198","category":"founder","time_slot":"EVENING","author":"Konosuke Matsushita","author_ko":"마쓰시타 고노스케","era":"1894-1989","quote_en":"The true worth of a person is measured by how they respond to adversity.","quote_ko":"사람의 진정한 가치는 역경에 어떻게 반응하는가로 측정된다.","copyright":"attributed","source":"Autobiography","motivation_level":"medium"},{"id":"199","category":"founder","time_slot":"DAWN","author":"Sam Walton","author_ko":"샘 월턴","era":"1918-1992","quote_en":"High expectations are the key to everything.","quote_ko":"높은 기대가 모든 것의 열쇠다.","copyright":"attributed","source":"Made in America","motivation_level":"medium"},{"id":"200","category":"founder","time_slot":"MORNING","author":"Ray Kroc","author_ko":"레이 크록","era":"1902-1984","quote_en":"Luck is a dividend of sweat. The more you sweat, the luckier you get.","quote_ko":"운은 땀의 배당이다. 더 많이 땀 흘릴수록 더 운이 좋아진다.","copyright":"attributed","source":"Grinding It Out","motivation_level":"medium"},{"id":"201","category":"founder","time_slot":"DAWN","author":"Walt Disney","author_ko":"월트 디즈니","era":"1901-1966","quote_en":"If you can dream it, you can do it.","quote_ko":"꿈꿀 수 있다면 할 수 있다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"202","category":"founder","time_slot":"MORNING","author":"Walt Disney","author_ko":"월트 디즈니","era":"1901-1966","quote_en":"The way to get started is to quit talking and begin doing.","quote_ko":"시작하는 방법은 말하기를 멈추고 실행하는 것이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"203","category":"founder","time_slot":"DAWN","author":"Henry Ford","author_ko":"헨리 포드","era":"1863-1947","quote_en":"Whether you think you can, or think you can't—you're right.","quote_ko":"할 수 있다 생각하든, 할 수 없다 생각하든—당신이 옳다.","copyright":"public_domain","source":"My Life and Work","motivation_level":"medium"},{"id":"204","category":"founder","time_slot":"AFTERNOON","author":"Henry Ford","author_ko":"헨리 포드","era":"1863-1947","quote_en":"Failure is simply the opportunity to begin again, this time more intelligently.","quote_ko":"실패는 더 현명하게 다시 시작할 기회일 뿐이다.","copyright":"public_domain","source":"My Life and Work","motivation_level":"hard"},{"id":"205","category":"founder","time_slot":"MORNING","author":"Thomas Edison","author_ko":"에디슨","era":"1847-1931","quote_en":"Genius is one percent inspiration and ninety-nine percent perspiration.","quote_ko":"천재는 1%의 영감과 99%의 땀이다.","copyright":"public_domain","source":"Interview","motivation_level":"medium"},{"id":"206","category":"founder","time_slot":"AFTERNOON","author":"Thomas Edison","author_ko":"에디슨","era":"1847-1931","quote_en":"I have not failed. I've just found 10,000 ways that won't work.","quote_ko":"나는 실패한 적 없다. 작동하지 않는 만 가지 방법을 찾았을 뿐이다.","copyright":"public_domain","source":"Interview","motivation_level":"hard"},{"id":"207","category":"founder","time_slot":"EVENING","author":"Andrew Carnegie","author_ko":"앤드루 카네기","era":"1835-1919","quote_en":"The man who dies rich dies disgraced.","quote_ko":"부자로 죽는 자는 치욕스럽게 죽는 것이다.","copyright":"public_domain","source":"The Gospel of Wealth","motivation_level":"medium"},{"id":"208","category":"founder","time_slot":"AFTERNOON","author":"John D. Rockefeller","author_ko":"록펠러","era":"1839-1937","quote_en":"Don't be afraid to give up the good to go for the great.","quote_ko":"위대함을 위해 좋음을 포기하기를 두려워 마라.","copyright":"public_domain","source":"Memoirs","motivation_level":"medium"},{"id":"209","category":"founder","time_slot":"DAWN","author":"J.P. Morgan","author_ko":"J.P. 모건","era":"1837-1913","quote_en":"The first step towards getting somewhere is to decide you're not going to stay where you are.","quote_ko":"어딘가로 가는 첫걸음은 지금 있는 곳에 머물지 않기로 결심하는 것이다.","copyright":"public_domain","source":"Letters","motivation_level":"hard"},{"id":"210","category":"founder","time_slot":"AFTERNOON","author":"Mary Kay Ash","author_ko":"메리 케이 애시","era":"1918-2001","quote_en":"A mediocre idea that generates enthusiasm will go further than a great idea that inspires no one.","quote_ko":"열정을 불러일으키는 평범한 아이디어가 영감을 주지 못하는 위대한 아이디어보다 더 멀리 간다.","copyright":"attributed","source":"Mary Kay on People Management","motivation_level":"medium"},{"id":"211","category":"founder","time_slot":"DAWN","author":"Oprah Winfrey","author_ko":"오프라 윈프리","era":"1954-","quote_en":"The biggest adventure you can take is to live the life of your dreams.","quote_ko":"가장 큰 모험은 꿈꾸는 삶을 사는 것이다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"212","category":"founder","time_slot":"DAWN","author":"Sara Blakely","author_ko":"사라 블레이클리","era":"1971-","quote_en":"Don't be intimidated by what you don't know. That can be your greatest strength.","quote_ko":"모르는 것에 주눅 들지 마라. 그것이 최대 강점이 될 수 있다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"213","category":"founder","time_slot":"MORNING","author":"Sheryl Sandberg","author_ko":"셰릴 샌드버그","era":"1969-","quote_en":"Done is better than perfect.","quote_ko":"완료가 완벽보다 낫다.","copyright":"attributed","source":"Lean In","motivation_level":"medium"},{"id":"214","category":"founder","time_slot":"AFTERNOON","author":"Anita Roddick","author_ko":"아니타 로딕","era":"1942-2007","quote_en":"If you think you're too small to have an impact, try going to bed with a mosquito.","quote_ko":"자신이 너무 작아 영향을 미치지 못한다 생각한다면 모기와 함께 자봐라.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"215","category":"founder","time_slot":"EVENING","author":"Howard Schultz","author_ko":"하워드 슐츠","era":"1953-","quote_en":"In life, you can blame a lot of people and you can wallow in self-pity, or you can pick yourself up and say 'Listen, I have to be responsible for myself.'","quote_ko":"인생에서 남을 탓하고 자기 연민에 빠질 수도 있고, 일어나서 '내가 나를 책임져야 한다'고 말할 수도 있다.","copyright":"attributed","source":"Pour Your Heart Into It","motivation_level":"medium"},{"id":"216","category":"founder","time_slot":"EVENING","author":"Phil Knight","author_ko":"필 나이트","era":"1938-","quote_en":"Don't tell people how to do things, tell them what to do and let them surprise you with their results.","quote_ko":"어떻게 하라고 하지 말고, 무엇을 하라고 말한 뒤 결과로 놀라게 하라.","copyright":"attributed","source":"Shoe Dog","motivation_level":"medium"},{"id":"217","category":"founder","time_slot":"AFTERNOON","author":"Bernard Arnault","author_ko":"베르나르 아르노","era":"1949-","quote_en":"If you set the bar at two meters and only jump one and a half, it's still a decent performance.","quote_ko":"2미터 바를 세우고 1.5미터만 뛰어넘어도 괜찮은 성과다.","copyright":"attributed","source":"Interview","motivation_level":"calm"},{"id":"218","category":"founder","time_slot":"AFTERNOON","author":"Michael Dell","author_ko":"마이클 델","era":"1965-","quote_en":"You don't have to be a genius or a visionary or even a college graduate to be successful. You just need a framework and a dream.","quote_ko":"성공에 천재나 비전가, 대졸자일 필요는 없다. 프레임워크와 꿈이면 된다.","copyright":"attributed","source":"Direct from Dell","motivation_level":"medium"},{"id":"219","category":"founder","time_slot":"AFTERNOON","author":"Larry Ellison","author_ko":"래리 엘리슨","era":"1944-","quote_en":"When you innovate, you've got to be prepared for people telling you that you are nuts.","quote_ko":"혁신하려면 사람들이 너를 미쳤다고 말할 것에 대비해야 한다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"220","category":"founder","time_slot":"EVENING","author":"Marc Benioff","author_ko":"마크 베니오프","era":"1964-","quote_en":"The business of business is improving the state of the world.","quote_ko":"비즈니스의 비즈니스는 세상의 상태를 개선하는 것이다.","copyright":"attributed","source":"Trailblazer","motivation_level":"medium"},{"id":"221","category":"founder","time_slot":"AFTERNOON","author":"Masayoshi Son","author_ko":"손정의","era":"1957-","quote_en":"Those who are crazy enough to think they can change the world are the ones who do.","quote_ko":"세상을 바꿀 수 있다고 믿을 만큼 미친 자들이 실제로 세상을 바꾼다.","copyright":"attributed","source":"Interview","motivation_level":"medium"},{"id":"222","category":"founder","time_slot":"AFTERNOON","author":"Naval Ravikant","author_ko":"나발 라비칸트","era":"1974-","quote_en":"Play long-term games with long-term people.","quote_ko":"장기적 사람들과 장기적 게임을 하라.","copyright":"attributed","source":"Almanack","motivation_level":"medium"},{"id":"223","category":"founder","time_slot":"AFTERNOON","author":"Naval Ravikant","author_ko":"나발 라비칸트","era":"1974-","quote_en":"Seek wealth, not money or status.","quote_ko":"돈이나 지위가 아니라 부를 추구하라.","copyright":"attributed","source":"Almanack","motivation_level":"medium"},{"id":"224","category":"founder","time_slot":"AFTERNOON","author":"Andrew Grove","author_ko":"앤디 그로브","era":"1936-2016","quote_en":"Only the paranoid survive.","quote_ko":"편집증만이 살아남는다.","copyright":"attributed","source":"Book title","motivation_level":"medium"},{"id":"225","category":"founder","time_slot":"NIGHT","author":"Tony Hsieh","author_ko":"토니 셰이","era":"1973-2020","quote_en":"Chase the vision, not the money. The money will end up following you.","quote_ko":"돈이 아니라 비전을 좇아라. 돈은 결국 따라온다.","copyright":"attributed","source":"Delivering Happiness","motivation_level":"calm"},{"id":"226","category":"growth","time_slot":"MORNING","author":"James Clear","author_ko":"제임스 클리어","era":"1986-","quote_en":"You do not rise to the level of your goals. You fall to the level of your systems.","quote_ko":"목표의 수준으로 올라가는 것이 아니라, 시스템의 수준으로 떨어진다.","copyright":"
